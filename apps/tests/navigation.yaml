web:
  url: "${WEB_URL}"
  viewportWidth: 1280
  viewportHeight: 800

agent:
  testId: "navigation"
  generateReport: true

tasks:
  # 正常场景
  - name: "从登录页面点击立即注册，跳转到注册页面"
    continueOnError: true
    flow:
      - javascript: "window.location.href = '/login'"
      - sleep: 1000
      - aiTap: "点击立即注册链接"
      - aiWaitFor: "页面跳转到注册页面"
        timeout: 3000
      - aiAssert: "注册表单为空白状态，无预填数据"
        errorMessage: "跳转到注册页面时应该是空白表单"

  - name: "从注册页面点击返回登录，跳转到登录页面"
    continueOnError: true
    flow:
      - javascript: "window.location.href = '/register'"
      - sleep: 1000
      - aiTap: "点击返回登录链接"
      - aiWaitFor: "页面跳转到登录页面"
        timeout: 3000
      - aiAssert: "登录表单为空白状态"
        errorMessage: "跳转到登录页面时应该是空白表单"

  - name: "注册成功后跳转到登录页面或自动登录"
    continueOnError: true
    flow:
      - javascript: "window.location.href = '/register'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "nav-test@example.com"
      - aiInput: "找到昵称输入框"
        value: "导航测试"
      - aiInput: "找到密码输入框"
        value: "Pass123"
      - aiTap: "勾选隐私协议复选框"
      - aiTap: "点击注册按钮"
      - aiWaitFor: "显示注册成功提示"
        timeout: 5000
      - sleep: 1500
      - aiAssert: "页面自动跳转到登录页面或直接跳转到笔记主页面"
        errorMessage: "注册成功后应该自动跳转"

  - name: "登录成功后跳转到主页面"
    continueOnError: true
    flow:
      - javascript: "document.cookie = ''; window.location.href = '/login'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "nav-test@example.com"
      - aiInput: "找到密码输入框"
        value: "Pass123"
      - aiTap: "点击登录按钮"
      - aiWaitFor: "页面跳转到主页面"
        timeout: 5000
      - aiAssert: "页面显示笔记列表或主应用界面，URL为/memo"
        errorMessage: "登录成功后应该跳转到主页面"

  # 异常场景
  - name: "在登录注册页面之间来回切换，之前填写的表单数据不保留"
    continueOnError: true
    flow:
      - javascript: "window.location.href = '/login'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "test@example.com"
      - aiTap: "点击立即注册链接"
      - sleep: 1000
      - aiTap: "点击返回登录链接"
      - sleep: 1000
      - aiAssert: "登录页面的邮箱输入框为空，密码输入框为空"
        errorMessage: "页面切换时应该清除之前填写的数据"
