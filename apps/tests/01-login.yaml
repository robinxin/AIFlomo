web:
  url: ${WEB_URL}
  viewportWidth: 1280
  viewportHeight: 960

agent:
  groupName: "001-login-page"
  groupDescription: "账号密码登录 E2E 测试"

tasks:
  # AC#1: 正确账号密码登录成功，跳转主应用页
  - name: AC1 - 正确账号密码登录成功
    flow:
      - aiWaitFor: 登录页面已加载，包含用户名和密码输入框
        timeout: 10000
      - aiInput: 用户名输入框
        value: ${WEB_USERNAME}
      - aiInput: 密码输入框
        value: ${WEB_PASSWORD}
      - aiTap: 登录按钮
      - sleep: 2000
      - aiAssert: 页面已离开登录页，显示主应用内容（如欢迎信息或退出按钮）
        errorMessage: "AC1 失败：正确账号密码登录后未跳转到主应用页"

  # AC#5: 已登录用户访问 /login 时自动跳转回主应用页
  - name: AC5 - 已登录用户访问登录页自动跳转
    flow:
      - javascript: "window.location.href = window.location.origin + '/login'"
      - sleep: 2000
      - aiAssert: 页面已自动跳转回主应用，未停留在登录页
        errorMessage: "AC5 失败：已登录用户访问 /login 未自动跳转到主应用"

  # 退出登录（为后续用例准备未登录状态）
  - name: 退出登录（清理状态）
    flow:
      - aiTap: 退出登录按钮
      - sleep: 1000
      - aiAssert: 页面已返回登录页，显示用户名和密码输入框
        errorMessage: "退出登录失败：未跳转回登录页"

  # AC#2: 错误账号密码，显示错误提示
  - name: AC2 - 错误密码显示错误信息
    flow:
      - aiInput: 用户名输入框
        value: ${WEB_USERNAME}
      - aiInput: 密码输入框
        value: ${WEB_WRONG_PASSWORD}
      - aiTap: 登录按钮
      - sleep: 1500
      - aiAssert: 页面显示"用户名或密码错误"的错误提示，且未跳转离开登录页
        errorMessage: "AC2 失败：错误密码未显示错误提示或意外跳转"

  # AC#3: 空字段提交，显示前端校验错误
  - name: AC3 - 空字段提交显示前端校验错误
    flow:
      - javascript: "document.querySelectorAll('input').forEach(i => i.value = '')"
      - aiTap: 登录按钮
      - sleep: 500
      - aiAssert: 页面显示前端校验错误提示（如"请输入用户名"或"字段不能为空"），且未发起网络请求跳转
        errorMessage: "AC3 失败：空字段提交未触发前端校验错误"
