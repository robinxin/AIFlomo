web:
  url: "${WEB_URL}"
  viewportWidth: 1280
  viewportHeight: 800

agent:
  testId: "page-navigation"
  generateReport: true

tasks:
  # 正常场景
  - name: "从登录页面点击立即注册，跳转到注册页面"
    continueOnError: true
    flow:
      - javascript: "document.cookie = ''; window.location.href = '/login'"
      - sleep: 1000
      - aiTap: "点击立即注册链接"
      - aiWaitFor: "页面跳转到注册页面"
        timeout: 3000
      - aiAssert: "当前在注册页面，注册表单为空白状态"
        errorMessage: "应该从登录页成功跳转到注册页"

  - name: "从注册页面点击返回登录，跳转到登录页面"
    continueOnError: true
    flow:
      - javascript: "document.cookie = ''; window.location.href = '/register'"
      - sleep: 1000
      - aiTap: "点击返回登录链接"
      - aiWaitFor: "页面跳转到登录页面"
        timeout: 3000
      - aiAssert: "当前在登录页面，登录表单为空白状态"
        errorMessage: "应该从注册页成功跳转到登录页"

  - name: "注册成功后跳转到登录页面或自动登录"
    continueOnError: true
    flow:
      - javascript: "document.cookie = ''; window.location.href = '/register'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "navtest@example.com"
      - aiInput: "找到昵称输入框"
        value: "导航测试"
      - aiInput: "找到密码输入框"
        value: "Pass123"
      - aiTap: "勾选隐私协议复选框"
      - aiTap: "点击注册按钮"
      - aiWaitFor: "显示注册成功提示，并自动跳转"
        timeout: 5000
      - aiAssert: "跳转到登录页面或直接进入主页面"
        errorMessage: "注册成功后应该自动跳转"

  - name: "登录成功后跳转到主页面"
    continueOnError: true
    flow:
      # 先注册
      - javascript: "document.cookie = ''; window.location.href = '/register'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "loginnavtest@example.com"
      - aiInput: "找到昵称输入框"
        value: "登录导航测试"
      - aiInput: "找到密码输入框"
        value: "Pass123"
      - aiTap: "勾选隐私协议复选框"
      - aiTap: "点击注册按钮"
      - aiWaitFor: "注册成功"
        timeout: 5000
      # 再登录
      - javascript: "document.cookie = ''; window.location.href = '/login'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "loginnavtest@example.com"
      - aiInput: "找到密码输入框"
        value: "Pass123"
      - aiTap: "点击登录按钮"
      - aiWaitFor: "登录成功，跳转到主页面"
        timeout: 5000
      - aiAssert: "成功进入主应用页面"
        errorMessage: "登录成功后应该跳转到主页面"

  # 异常场景
  - name: "在登录注册页面之间来回切换，之前填写的表单数据不保留"
    continueOnError: true
    flow:
      - javascript: "document.cookie = ''; window.location.href = '/login'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "test@example.com"
      - aiTap: "点击立即注册链接"
      - aiWaitFor: "跳转到注册页面"
        timeout: 3000
      - aiTap: "点击返回登录链接"
      - aiWaitFor: "跳转回登录页面"
        timeout: 3000
      - aiAssert: "登录页面的邮箱和密码输入框为空，之前填写的数据已被清除"
        errorMessage: "页面切换时表单数据应该被清空"
