web:
  url: "${WEB_URL}"
  viewportWidth: 1280
  viewportHeight: 800

agent:
  testId: "form-validation"
  generateReport: true

tasks:
  # 正常场景
  - name: "邮箱格式正确,无错误提示"
    continueOnError: true
    flow:
      - javascript: "window.location.href = '/register'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "user@example.com"
      - ai: "光标移出邮箱输入框,点击其他输入框"
      - sleep: 1000
      - aiAssert: "邮箱输入框无错误提示"
        errorMessage: "正确的邮箱格式不应显示错误提示"

  - name: "密码长度符合要求,无错误提示"
    continueOnError: true
    flow:
      - javascript: "window.location.href = '/register'"
      - sleep: 1000
      - aiInput: "找到密码输入框"
        value: "Pass123"
      - ai: "光标移出密码输入框,点击其他输入框"
      - sleep: 1000
      - aiAssert: "密码输入框无错误提示"
        errorMessage: "符合要求的密码不应显示错误提示"

  # 异常场景
  - name: "实时邮箱格式校验"
    continueOnError: true
    flow:
      - javascript: "window.location.href = '/register'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "invalid"
      - ai: "光标移出邮箱输入框,点击其他输入框"
      - sleep: 1500
      - aiAssert: "邮箱输入框下方显示红色错误提示:'请输入有效的邮箱地址'"
        errorMessage: "无效邮箱格式应立即显示错误提示,但未显示"

  - name: "密码输入框以掩码形式显示"
    continueOnError: true
    flow:
      - javascript: "window.location.href = '/register'"
      - sleep: 1000
      - aiInput: "找到密码输入框"
        value: "Pass123"
      - aiAssert: "密码输入框中内容以掩码形式(星号或圆点)显示,实际字符不可见"
        errorMessage: "密码输入框未使用掩码形式显示"
