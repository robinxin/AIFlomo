web:
  url: "${WEB_URL}"
  viewportWidth: 1280
  viewportHeight: 800

agent:
  testId: "user-login"
  generateReport: true

tasks:
  # 正常场景
  - name: "有效邮箱和密码,登录成功"
    continueOnError: true
    flow:
      # 注:假设用户已注册,邮箱:user@example.com,密码:Pass123
      - javascript: "window.location.href = '/login'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "user@example.com"
      - aiInput: "找到密码输入框"
        value: "Pass123!"
      - aiTap: "点击登录按钮"
      - aiWaitFor: "登录成功,页面跳转到主页面"
        timeout: 5000
      - aiAssert: "用户成功登录并进入主应用页面(/memo)"
        errorMessage: "登录后未跳转到主页面"

  - name: "邮箱大小写混合,统一转小写比对,登录成功"
    continueOnError: true
    flow:
      # 注:假设注册时邮箱存储为user@example.com(小写)
      - javascript: "window.location.href = '/login'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "User@Example.com"
      - aiInput: "找到密码输入框"
        value: "Pass123!"
      - aiTap: "点击登录按钮"
      - aiWaitFor: "登录成功,页面跳转到主页面"
        timeout: 5000
      - aiAssert: "邮箱大小写混合也能成功登录"
        errorMessage: "邮箱大小写处理有误,登录失败"

  # 异常场景
  - name: "邮箱不存在,返回401"
    continueOnError: true
    flow:
      - javascript: "window.location.href = '/login'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "nonexistent@example.com"
      - aiInput: "找到密码输入框"
        value: "Pass123"
      - aiTap: "点击登录按钮"
      - aiWaitFor: "页面显示错误提示"
        timeout: 3000
      - aiAssert: "页面显示'邮箱或密码错误',不暴露具体是哪个错误"
        errorMessage: "邮箱不存在应统一提示'邮箱或密码错误',但未正确处理"

  - name: "密码错误,返回401"
    continueOnError: true
    flow:
      # 注:假设用户已注册,邮箱:user@example.com,正确密码:Pass123!
      - javascript: "window.location.href = '/login'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "user@example.com"
      - aiInput: "找到密码输入框"
        value: "WrongPass"
      - aiTap: "点击登录按钮"
      - aiWaitFor: "页面显示错误提示"
        timeout: 3000
      - aiAssert: "页面显示'邮箱或密码错误',不暴露具体是哪个错误"
        errorMessage: "密码错误应统一提示'邮箱或密码错误',但未正确处理"

  - name: "邮箱字段为空,返回400"
    continueOnError: true
    flow:
      - javascript: "window.location.href = '/login'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: ""
      - aiInput: "找到密码输入框"
        value: "Pass123"
      - aiTap: "点击登录按钮"
      - aiAssert: "页面显示'请填写完整信息'提示,未发起后端请求"
        errorMessage: "空邮箱应被前端拦截,但未拦截"

  - name: "密码字段为空,返回400"
    continueOnError: true
    flow:
      - javascript: "window.location.href = '/login'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "user@example.com"
      - aiInput: "找到密码输入框"
        value: ""
      - aiTap: "点击登录按钮"
      - aiAssert: "页面显示'请填写完整信息'提示,未发起后端请求"
        errorMessage: "空密码应被前端拦截,但未拦截"

  - name: "邮箱和密码都为空,返回400"
    continueOnError: true
    flow:
      - javascript: "window.location.href = '/login'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: ""
      - aiInput: "找到密码输入框"
        value: ""
      - aiTap: "点击登录按钮"
      - aiAssert: "页面显示'请填写完整信息'提示,未发起后端请求"
        errorMessage: "空表单应被前端拦截,但未拦截"

  - name: "快速点击登录按钮多次,仅发起一次请求"
    continueOnError: true
    flow:
      - javascript: "window.location.href = '/login'"
      - sleep: 1000
      - aiInput: "找到邮箱输入框"
        value: "user@example.com"
      - aiInput: "找到密码输入框"
        value: "Pass123!"
      - aiTap: "点击登录按钮"
      - sleep: 100
      - aiAssert: "登录按钮变为禁用状态,仅发起一次请求"
        errorMessage: "未防止重复提交,可能发起多次请求"
