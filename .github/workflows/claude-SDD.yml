name: SDD - Claude Full Lifecycle (Spec Review + Code Gen + Test Gen)
on:
  push:
    branches: [workflow-jl, main]
    paths:
      - 'specs/active/**'
  workflow_dispatch:

jobs:
  sdd-full-lifecycle:
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      CODE_GEN_DIR: 'apps/flomo/app/'
      TEST_GEN_DIR: 'apps/flomo/tests/'
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: "https://claude.hatch.yinxiang.com/api"
    steps:
      - name: Checkout code & spec
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitHub CLI (gh)
        run: |
          if ! command -v gh &> /dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update && sudo apt install -y gh
          fi

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      # -------------------------- 核心：动态识别变更的 Spec 文件 --------------------------
      - name: Detect Changed Spec Files
        id: detect-spec-files
        run: |
          CHANGED_SPEC_FILES=""
          SPEC_CONTENT=""

          if [ "${{ github.event_name }}" = "push" ]; then
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep '^specs/active/.*\.\(md\|yaml\|yml\|json\)$' || true)
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # workflow_dispatch: 使用所有 specs/active 下的文件
            CHANGED_FILES=$(find specs/active -type f \( -name '*.md' -o -name '*.yaml' -o -name '*.yml' -o -name '*.json' \) | grep -v '\.fix\.' || true)
          fi

          CHANGED_SPEC_FILES=$(echo "$CHANGED_FILES" | sort | uniq | grep -E '^specs/active/.*\.(md|yaml|yml|json)$' || true)

          if [ -z "$CHANGED_SPEC_FILES" ]; then
            echo "❌ No changed spec files found in specs/active/**/*, aborting workflow!"
            exit 1
          fi

          for FILE in $CHANGED_SPEC_FILES; do
            if [ ! -f "$FILE" ]; then
              echo "❌ Spec file $FILE not found, aborting workflow!"
              exit 1
            fi
          done

          for FILE in $CHANGED_SPEC_FILES; do
            echo "📄 Reading spec file: $FILE"
          done

          echo "changed_spec_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED_SPEC_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "spec_files_list=$(echo "$CHANGED_SPEC_FILES" | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"

      # -------------------------- 场景1：审查 Spec 合理性 --------------------------
      - name: Step 1 - Review Spec Rationality
        id: review-spec
        if: steps.detect-spec-files.outputs.changed_spec_files != ''
        run: |
          cat > /tmp/sdd-prompt.txt <<'PROMPT_EOF'
          ### CHANGED SPEC FILES
          ${{ steps.detect-spec-files.outputs.spec_files_list }}

          ### TASK: Spec Rationality Review
          Read the spec files listed above from the repository, then analyze them for SDD and output:
          1. **Completeness**: List missing parts for EACH file
          2. **Ambiguity**: Highlight vague descriptions for EACH file
          3. **Logical Conflicts**: Point out contradictory rules BETWEEN files
          4. **Improvement Suggestions**: Specific, actionable changes

          ### RULES
          - Be objective and specific
          - Prioritize critical issues
          - Clearly link all issues to the corresponding spec file name
          - If spec has fatal flaws, explicitly mark as CRITICAL
          PROMPT_EOF

          RESULT=$(claude --print --model claude-sonnet-4-5-20250929 --allowedTools "Read" < /tmp/sdd-prompt.txt)

          echo "review_result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # -------------------------- 生成 Spec 修复建议文件 --------------------------
      - name: Generate Spec Fix Suggestion Files
        id: gen-spec-fix
        if: steps.review-spec.outcome == 'success'
        env:
          SPEC_REVIEW_RESULT: ${{ steps.review-spec.outputs.review_result }}
          CHANGED_SPEC_FILES: ${{ steps.detect-spec-files.outputs.changed_spec_files }}
        run: |
          if [ -z "$SPEC_REVIEW_RESULT" ]; then
            echo "❌ Empty Spec review result, aborting workflow!"
            exit 1
          fi

          for FILE in $CHANGED_SPEC_FILES; do
            case "$FILE" in
              *.md) FIX_FILE="${FILE%.md}.fix.md" ;;
              *.yaml|*.yml) FIX_FILE="${FILE%.*}.fix.yml" ;;
              *.json) FIX_FILE="${FILE%.json}.fix.json" ;;
              *) FIX_FILE="$FILE.fix" ;;
            esac

            echo "# Spec Fix Suggestion: $FILE" > "$FIX_FILE"
            echo "## Generated at: $(date)" >> "$FIX_FILE"
            echo "## Review Result for $FILE" >> "$FIX_FILE"
            echo -e "\n$SPEC_REVIEW_RESULT" >> "$FIX_FILE"

            echo "✅ Fix suggestion file created: $FIX_FILE"
          done

          FIX_FILES=$(ls specs/active/*.fix.* 2>/dev/null | tr '\n' ',' | sed 's/,$//')
          echo "spec_fix_files=$FIX_FILES" >> "$GITHUB_OUTPUT"

      # -------------------------- 场景2：根据 Spec 生成代码 --------------------------
      - name: Step 2 - Generate Code from Spec
        id: gen-code
        if: steps.review-spec.outcome == 'success'
        run: |
          cat > /tmp/sdd-prompt.txt <<'PROMPT_EOF'
          ### CHANGED SPEC FILES
          ${{ steps.detect-spec-files.outputs.spec_files_list }}

          ### TASK: Generate Code from Spec (SDD)
          Read the spec files listed above from the repository, then generate production-ready code:
          1. Save code to directory: ${{ env.CODE_GEN_DIR }} (create subdirectories if needed)
          2. Use the same programming language as existing code in apps/flomo/app/
          3. Follow the spec's interface/parameter/return value rules strictly
          4. Add clear comments linking code to specific spec files/sections
          5. Generate only the code defined in the spec
          6. Ensure consistency across code generated from multiple spec files
          PROMPT_EOF

          RESULT=$(claude --print --model claude-sonnet-4-5-20250929 \
            --allowedTools "Read,Write,Edit,Bash(mkdir:*),Bash(ls:*)" \
            < /tmp/sdd-prompt.txt)

          echo "code_result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # -------------------------- 场景3：生成测试用例 --------------------------
      - name: Step 3 - Generate Test Cases from Spec
        id: gen-test
        if: steps.gen-code.outcome == 'success'
        run: |
          cat > /tmp/sdd-prompt.txt <<'PROMPT_EOF'
          ### CHANGED SPEC FILES
          ${{ steps.detect-spec-files.outputs.spec_files_list }}

          ### TASK: Generate Test Cases from Spec (SDD)
          Read the spec files listed above and the generated code in ${{ env.CODE_GEN_DIR }}, then generate test cases:
          1. Save test cases to directory: ${{ env.TEST_GEN_DIR }}
          2. Align test framework with existing tests in apps/flomo/tests/
          3. Cover ALL functions/rules defined in the spec (positive, negative, edge cases)
          4. Link each test case to the corresponding spec file/section
          5. Ensure test cases are fully runnable
          6. Include assertions that validate compliance with spec requirements
          PROMPT_EOF

          RESULT=$(claude --print --model claude-sonnet-4-5-20250929 \
            --allowedTools "Read,Write,Edit,Bash(mkdir:*),Bash(ls:*)" \
            < /tmp/sdd-prompt.txt)

          echo "test_result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # -------------------------- 提交生成的文件 --------------------------
      - name: Commit Generated Files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git add "$CODE_GEN_DIR" "$TEST_GEN_DIR" specs/active/*.fix.* 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "ℹ️ No generated files to commit, skipping commit step."
          else
            git commit -m "SDD: Auto-generate code/tests/spec-fix from changed spec files (${{ github.sha }})"
            git push origin ${{ github.ref_name }}
            echo "✅ Generated files committed to ${{ github.ref_name }}"
          fi

      # -------------------------- 发布结果到 Issue --------------------------
      - name: Publish All SDD Results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPEC_REVIEW_RESULT: ${{ steps.review-spec.outputs.review_result }}
          SPEC_FIX_FILES: ${{ steps.gen-spec-fix.outputs.spec_fix_files || 'None' }}
          CODE_RESULT: ${{ steps.gen-code.outputs.code_result }}
          TEST_RESULT: ${{ steps.gen-test.outputs.test_result }}
          COMMIT_SHA: ${{ github.sha }}
          SPEC_FILES_LIST: ${{ steps.detect-spec-files.outputs.spec_files_list }}
        run: |
          SPEC_REVIEW_RESULT=${SPEC_REVIEW_RESULT:-"⚠️ No Spec review result returned."}

          FINAL_RESULT="## 📋 SDD Full Lifecycle Result
          - Commit SHA: $COMMIT_SHA
          - Changed Spec Files: $SPEC_FILES_LIST
          - Spec Fix Files: $SPEC_FIX_FILES
          - Code Gen Directory: ${{ env.CODE_GEN_DIR }}
          - Test Gen Directory: ${{ env.TEST_GEN_DIR }}

          ### 1. Spec Rationality Review
          $SPEC_REVIEW_RESULT

          ### 2. Code Generation Summary
          $CODE_RESULT

          ### 3. Test Case Generation Summary
          $TEST_RESULT

          > Notes:
          > - Generated files are committed to the repository.
          > - Spec fix suggestions are saved to specs/active/*.fix.* files.
          > - Workflow aborts immediately on any step failure (strict mode)."

          gh issue create \
            --title "SDD Full Lifecycle: $COMMIT_SHA (Spec: $SPEC_FILES_LIST)" \
            --body "$FINAL_RESULT" \
            --label "sdd-full-lifecycle,claude-official,auto-gen,strict-mode"
          echo "✅ SDD results published to new Issue"
