name: SDD Pipeline

on:
  push:
    branches: ['feat/**']
    paths:
      - 'specs/active/**'
  workflow_dispatch:
    inputs:
      extra_prompt:
        description: '额外指令（追加到 AI prompt 末尾）'
        default: ''
        required: false
      run_sdd:
        description: 'Run SDD (1=yes, 0=no)'
        default: '1'
        required: true

# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║  SDD Pipeline                                                           ║
# ║  Detect ─┬─ Plan → 🔒Design → Task → 🔒Task → Codegen                  ║
# ║           └─ Testcase → 🔒Testcase → Testcase Code → 🔒Testcase Code    ║
# ║  两条线完成后 → 触发 Quality Gate Pipeline                                ║
# ╚═══════════════════════════════════════════════════════════════════════════╝

jobs:
  # ─── SDD-Detect ─────────────────────────────────────────────────
  sdd-detect:
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: read
      issues: write
    outputs:
      spec_changed: ${{ steps.detect.outputs.spec_changed }}
      spec_files:   ${{ steps.detect.outputs.spec_files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed spec files
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "push" ] \
               && git cat-file -e "${{ github.event.before }}"^{commit} 2>/dev/null; then
            FILES=$(git diff --name-only \
              "${{ github.event.before }}" "${{ github.sha }}" \
              -- specs/active/ \
              | grep -E '\.md$' \
              | grep -vE '(-design|-tasks|-testcases)\.md$' || true)
          else
            FILES=$(ls specs/active/ 2>/dev/null \
              | grep -E '\.md$' \
              | grep -vE '(-design|-tasks|-testcases)\.md$' \
              | sed 's#^#specs/active/#' || true)
          fi

          if [ -n "$FILES" ]; then
            echo "spec_changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Changed specs:"
            echo "$FILES"
          else
            echo "spec_changed=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No spec changes detected."
          fi

          {
            echo "spec_files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post spec preview to Issue
        if: steps.detect.outputs.spec_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(echo "${{ github.ref_name }}" | sed 's|.*\/\([0-9]*\)-.*|\1|')
          if [ "$ISSUE_NUMBER" = "${{ github.ref_name }}" ] || [ -z "$ISSUE_NUMBER" ]; then
            echo "Not a feat/<n>-* or bugfix/<n>-* branch — skipping Issue preview."
            exit 0
          fi

          SPEC_FILES="${{ steps.detect.outputs.spec_files }}"
          {
            printf '📋 **SDD Pipeline 已启动**\n\n'
            printf '[查看进度](%s/%s/actions/runs/%s)\n\n' \
              "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}"
            printf '<details><summary>📄 查看 Spec 全文（点击展开）</summary>\n\n```markdown\n'
            cat $SPEC_FILES 2>/dev/null || echo "spec file not found"
            printf '```\n\n</details>\n'
          } > /tmp/spec-preview.md

          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/spec-preview.md

  # ─── SDD-Plan ───────────────────────────────────────────────────
  sdd-plan:
    needs: [sdd-detect]
    if: >-
      ${{ needs.sdd-detect.outputs.spec_changed == 'true'
          && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_sdd == '1') }}
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: write
      issues: write
    outputs:
      design_file: ${{ steps.design.outputs.design_file }}
    env:
      ANTHROPIC_BASE_URL: 'http://127.0.0.1:18080'
      UPSTREAM_API_URL:   'https://claude.hatch.yinxiang.com/api'
      MODEL:              'claude-sonnet-4-5-20250929'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start proxy (strip context_management)
        env:
          UPSTREAM_API_URL: ${{ env.UPSTREAM_API_URL }}
        run: |
          cat > /tmp/strip-proxy.js << 'EOF'
          const http = require('http'), https = require('https');
          const up = new URL(process.env.UPSTREAM_API_URL);
          http.createServer((req, res) => {
            let body = '';
            req.on('data', c => body += c);
            req.on('end', () => {
              try { const d = JSON.parse(body); delete d.context_management; body = JSON.stringify(d); } catch(e) {}
              const opts = {
                hostname: up.hostname, port: 443,
                path: up.pathname + (req.url === '/' ? '' : req.url),
                method: req.method,
                headers: { ...req.headers, host: up.hostname, 'content-length': Buffer.byteLength(body) }
              };
              const r = https.request(opts, pr => { res.writeHead(pr.statusCode, pr.headers); pr.pipe(res); });
              r.on('error', e => { res.writeHead(502); res.end(e.message); });
              r.write(body); r.end();
            });
          }).listen(18080, '127.0.0.1', () => console.log('Proxy ready on :18080'));
          EOF
          node /tmp/strip-proxy.js &
          sleep 2

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.50

      - name: Load Constitution and CLAUDE.md
        run: |
          {
            echo "CONSTITUTION<<CONSTITUTION_EOF"
            cat CONSTITUTION.md 2>/dev/null || echo "# No constitution file found"
            echo "CONSTITUTION_EOF"
          } >> "$GITHUB_ENV"
          {
            echo "CLAUDE_MD<<CLAUDE_MD_EOF"
            cat CLAUDE.md 2>/dev/null || echo "# No CLAUDE.md found"
            echo "CLAUDE_MD_EOF"
          } >> "$GITHUB_ENV"

      - name: Generate technical design document
        id: design
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXTRA_PROMPT: ${{ github.event.inputs.extra_prompt }}
        run: |
          export SPEC_FILES="${{ needs.sdd-detect.outputs.spec_files }}"

          FIRST_SPEC=$(echo "$SPEC_FILES" | head -1)
          export DESIGN_FILE=$(echo "$FIRST_SPEC" | sed 's/\.md$/-design.md/')

          echo "design_file=$DESIGN_FILE" >> "$GITHUB_OUTPUT"

          if [ -f "$DESIGN_FILE" ]; then
            echo "♻️ Design file already exists, reusing: $DESIGN_FILE"
            echo "reused=true" >> "$GITHUB_OUTPUT"
          else
            echo "reused=false" >> "$GITHUB_OUTPUT"
            PROMPT_TEXT=$(python3 .github/scripts/envsubst.py < .github/prompts/sdd-design.md)

            claude --print \
              --allowedTools "Read,Write,Bash(ls:*),Bash(find:*)" \
              --model "$MODEL" \
              "$PROMPT_TEXT"
          fi

          {
            echo "## 📐 Technical Design Document"
            echo ""
            echo "**File**: \`$DESIGN_FILE\`"
            echo ""
            cat "$DESIGN_FILE" 2>/dev/null || echo "⚠️ Design file not found at $DESIGN_FILE"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit & push design document
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          git add specs/active/

          if git diff --cached --quiet; then
            echo "ℹ️ No design document to commit."
          else
            git commit -m "sdd: generate technical design document"
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push origin "HEAD:${{ github.ref_name }}"
            echo "✅ Design document committed to ${{ github.ref_name }}"
          fi

      - name: Post design document to Issue
        if: steps.design.outputs.reused != 'true'
        run: |
          ISSUE_NUMBER=$(echo "${{ github.ref_name }}" | sed 's|.*\/\([0-9]*\)-.*|\1|')
          if [ "$ISSUE_NUMBER" = "${{ github.ref_name }}" ] || [ -z "$ISSUE_NUMBER" ]; then
            echo "Not a feat/<n>-* or bugfix/<n>-* branch — skipping."
            exit 0
          fi

          DESIGN_FILE="${{ steps.design.outputs.design_file }}"
          {
            printf '📐 **技术方案文档已生成，等待审批**\n\n'
            printf '审批入口：[GitHub Actions → Design Approval](%s/%s/actions/runs/%s)\n\n' \
              "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}"
            printf '<details><summary>📄 查看技术方案全文（点击展开）</summary>\n\n'
            cat "$DESIGN_FILE" 2>/dev/null || echo "⚠️ Design file not found"
            printf '\n\n</details>\n'
          } > /tmp/design-comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/design-comment.md

  # ─── Design Approval Gate（轻量审批 job）───────────────────────
  design-gate:
    needs: sdd-plan
    environment: design-approval
    runs-on: [self-hosted, ai-runner]
    steps:
      - run: echo "Design document approved"

  # ─── SDD-Task（需通过 Plan 审批后执行）───────────────────────────
  sdd-task:
    needs: [sdd-detect, sdd-plan, design-gate]
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: write
      issues: write
    outputs:
      tasks_file: ${{ steps.decompose.outputs.tasks_file }}
    env:
      ANTHROPIC_BASE_URL: 'http://127.0.0.1:18080'
      UPSTREAM_API_URL:   'https://claude.hatch.yinxiang.com/api'
      MODEL:              'claude-sonnet-4-5-20250929'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start proxy (strip context_management)
        env:
          UPSTREAM_API_URL: ${{ env.UPSTREAM_API_URL }}
        run: |
          cat > /tmp/strip-proxy.js << 'EOF'
          const http = require('http'), https = require('https');
          const up = new URL(process.env.UPSTREAM_API_URL);
          http.createServer((req, res) => {
            let body = '';
            req.on('data', c => body += c);
            req.on('end', () => {
              try { const d = JSON.parse(body); delete d.context_management; body = JSON.stringify(d); } catch(e) {}
              const opts = {
                hostname: up.hostname, port: 443,
                path: up.pathname + (req.url === '/' ? '' : req.url),
                method: req.method,
                headers: { ...req.headers, host: up.hostname, 'content-length': Buffer.byteLength(body) }
              };
              const r = https.request(opts, pr => { res.writeHead(pr.statusCode, pr.headers); pr.pipe(res); });
              r.on('error', e => { res.writeHead(502); res.end(e.message); });
              r.write(body); r.end();
            });
          }).listen(18080, '127.0.0.1', () => console.log('Proxy ready on :18080'));
          EOF
          node /tmp/strip-proxy.js &
          sleep 2

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.50

      - name: Load Constitution and CLAUDE.md
        run: |
          {
            echo "CONSTITUTION<<CONSTITUTION_EOF"
            cat CONSTITUTION.md 2>/dev/null || echo "# No constitution file found"
            echo "CONSTITUTION_EOF"
          } >> "$GITHUB_ENV"
          {
            echo "CLAUDE_MD<<CLAUDE_MD_EOF"
            cat CLAUDE.md 2>/dev/null || echo "# No CLAUDE.md found"
            echo "CLAUDE_MD_EOF"
          } >> "$GITHUB_ENV"

      - name: Decompose into tasks
        id: decompose
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXTRA_PROMPT: ${{ github.event.inputs.extra_prompt }}
        run: |
          export SPEC_FILES="${{ needs.sdd-detect.outputs.spec_files }}"
          export DESIGN_FILE="${{ needs.sdd-plan.outputs.design_file }}"

          FIRST_SPEC=$(echo "$SPEC_FILES" | head -1)
          export TASKS_FILE=$(echo "$FIRST_SPEC" | sed 's/\.md$/-tasks.md/')
          echo "tasks_file=$TASKS_FILE" >> "$GITHUB_OUTPUT"

          if [ -f "$TASKS_FILE" ] && grep -q "^- \[.\] T" "$TASKS_FILE" 2>/dev/null; then
            echo "♻️ Tasks file already exists and is valid, reusing: $TASKS_FILE"
            echo "reused=true" >> "$GITHUB_OUTPUT"
          else
            echo "reused=false" >> "$GITHUB_OUTPUT"
            PROMPT_TEXT=$(python3 .github/scripts/envsubst.py < .github/prompts/sdd-task-breakdown.md)

            claude --print \
              --allowedTools "Read,Write,Bash(ls:*)" \
              --model "$MODEL" \
              "$PROMPT_TEXT"

            # Validate Markdown task list, fallback to single task
            if ! grep -q "^- \[.\] T" "$TASKS_FILE" 2>/dev/null; then
              echo "⚠️ Decompose output invalid or missing — falling back to single task"
              printf '# 任务清单: Full Implementation\n\n- [ ] T001 实现所有 Spec 需求\n' \
                > "$TASKS_FILE"
            fi
          fi

          {
            echo "## 📋 Task Breakdown"
            echo ""
            cat "$TASKS_FILE"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit & push tasks file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          git add specs/active/

          if git diff --cached --quiet; then
            echo "ℹ️ No tasks file to commit."
          else
            git commit -m "sdd: generate task breakdown"
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push origin "HEAD:${{ github.ref_name }}"
            echo "✅ Tasks file committed to ${{ github.ref_name }}"
          fi

      - name: Post task breakdown to Issue
        if: steps.decompose.outputs.reused != 'true'
        run: |
          ISSUE_NUMBER=$(echo "${{ github.ref_name }}" | sed 's|.*\/\([0-9]*\)-.*|\1|')
          if [ "$ISSUE_NUMBER" = "${{ github.ref_name }}" ] || [ -z "$ISSUE_NUMBER" ]; then
            echo "Not a feat/<n>-* or bugfix/<n>-* branch — skipping."
            exit 0
          fi

          TASKS_FILE="${{ steps.decompose.outputs.tasks_file }}"
          {
            printf '📋 **任务拆分已完成，等待审批**\n\n'
            printf '审批入口：[GitHub Actions → Task Approval](%s/%s/actions/runs/%s)\n\n' \
              "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}"
            cat "$TASKS_FILE"
          } > /tmp/tasks-comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/tasks-comment.md

  # ─── Task Approval Gate（轻量审批 job）─────────────────────────
  task-gate:
    needs: sdd-task
    environment: task-approval
    runs-on: [self-hosted, ai-runner]
    steps:
      - run: echo "Task breakdown approved"

  # ─── SDD-Codegen（调用 Reusable Workflow）─────────────────────────
  sdd-codegen:
    needs: [sdd-detect, sdd-plan, sdd-task, task-gate]
    uses: ./.github/workflows/sdd-codegen.yml
    with:
      mode: codegen
      branch: ${{ github.ref_name }}
      spec_files: ${{ needs.sdd-detect.outputs.spec_files }}
      design_file: ${{ needs.sdd-plan.outputs.design_file }}
      tasks_file: ${{ needs.sdd-task.outputs.tasks_file }}
      extra_prompt: ${{ github.event.inputs.extra_prompt || '' }}
    secrets: inherit

  # ═══════════════════════════════════════════════════════════════
  # Test Flow（与 SDD-Plan/Task/Codegen 并行）
  # Testcase → 🔒Testcase → Testcase Code → 🔒Testcase Code
  # ═══════════════════════════════════════════════════════════════

  # ─── Testcase — 从 Spec 生成测试用例描述（Plan 审批后执行）─────
  testcase:
    needs: [sdd-detect, sdd-plan, design-gate]
    if: >-
      ${{ needs.sdd-detect.outputs.spec_changed == 'true'
          && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_sdd == '1') }}
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: write
      issues: write
    outputs:
      testcase_file: ${{ steps.gen.outputs.testcase_file }}
    env:
      ANTHROPIC_BASE_URL: 'http://127.0.0.1:18080'
      UPSTREAM_API_URL:   'https://claude.hatch.yinxiang.com/api'
      MODEL:              'claude-sonnet-4-5-20250929'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start proxy (strip context_management)
        env:
          UPSTREAM_API_URL: ${{ env.UPSTREAM_API_URL }}
        run: |
          cat > /tmp/strip-proxy.js << 'EOF'
          const http = require('http'), https = require('https');
          const up = new URL(process.env.UPSTREAM_API_URL);
          http.createServer((req, res) => {
            let body = '';
            req.on('data', c => body += c);
            req.on('end', () => {
              try { const d = JSON.parse(body); delete d.context_management; body = JSON.stringify(d); } catch(e) {}
              const opts = {
                hostname: up.hostname, port: 443,
                path: up.pathname + (req.url === '/' ? '' : req.url),
                method: req.method,
                headers: { ...req.headers, host: up.hostname, 'content-length': Buffer.byteLength(body) }
              };
              const r = https.request(opts, pr => { res.writeHead(pr.statusCode, pr.headers); pr.pipe(res); });
              r.on('error', e => { res.writeHead(502); res.end(e.message); });
              r.write(body); r.end();
            });
          }).listen(18080, '127.0.0.1', () => console.log('Proxy ready on :18080'));
          EOF
          node /tmp/strip-proxy.js &
          sleep 2

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.50

      - name: Load Constitution and CLAUDE.md
        run: |
          {
            echo "CONSTITUTION<<CONSTITUTION_EOF"
            cat CONSTITUTION.md 2>/dev/null || echo "# No constitution file found"
            echo "CONSTITUTION_EOF"
          } >> "$GITHUB_ENV"
          {
            echo "CLAUDE_MD<<CLAUDE_MD_EOF"
            cat CLAUDE.md 2>/dev/null || echo "# No CLAUDE.md found"
            echo "CLAUDE_MD_EOF"
          } >> "$GITHUB_ENV"

      - name: Generate test case specifications
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXTRA_PROMPT: ${{ github.event.inputs.extra_prompt }}
        run: |
          export SPEC_FILES="${{ needs.sdd-detect.outputs.spec_files }}"
          export DESIGN_FILE="${{ needs.sdd-plan.outputs.design_file }}"
          
          export TEST_DIR="apps/tests"
          export WRITTEN_FILES="N/A — 源码尚未生成，请根据 Spec 生成测试用例规格文档"

          FIRST_SPEC=$(echo "$SPEC_FILES" | head -1)
          TESTCASE_FILE=$(echo "$FIRST_SPEC" | sed 's/\.md$/-testcases.md/')
          echo "testcase_file=$TESTCASE_FILE" >> "$GITHUB_OUTPUT"

          if [ -f "$TESTCASE_FILE" ]; then
            echo "♻️ Testcase file already exists, reusing: $TESTCASE_FILE"
            echo "reused=true" >> "$GITHUB_OUTPUT"
          else
            echo "reused=false" >> "$GITHUB_OUTPUT"
            PROMPT_TEXT=$(python3 .github/scripts/envsubst.py < .github/prompts/sdd-testcase.md)

            claude --print \
              --allowedTools "Read,Write,Bash(ls:*),Bash(find:*)" \
              --model "$MODEL" \
              "$PROMPT_TEXT"
          fi

      - name: Commit test case specs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          git add specs/active/

          if git diff --cached --quiet; then
            echo "ℹ️ No testcase file to commit."
          else
            git commit -m "sdd: generate test case specifications"
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push origin "HEAD:${{ github.ref_name }}"
            echo "✅ Testcase specs committed"
          fi

      - name: Post test cases to Issue
        if: steps.gen.outputs.reused != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(echo "${{ github.ref_name }}" | sed 's|.*\/\([0-9]*\)-.*|\1|')
          if [ "$ISSUE_NUMBER" = "${{ github.ref_name }}" ] || [ -z "$ISSUE_NUMBER" ]; then
            echo "Not a feat/<n>-* or bugfix/<n>-* branch — skipping."
            exit 0
          fi

          TESTCASE_FILE="${{ steps.gen.outputs.testcase_file }}"
          {
            printf '🧪 **测试用例已生成，等待审批**\n\n'
            printf '审批入口：[GitHub Actions → Testcase Approval](%s/%s/actions/runs/%s)\n\n' \
              "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}"
            printf '<details><summary>📄 查看测试用例全文（点击展开）</summary>\n\n'
            cat "$TESTCASE_FILE" 2>/dev/null || echo "⚠️ Testcase file not found"
            printf '\n\n</details>\n'
          } > /tmp/testcase-comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/testcase-comment.md

  # ─── Testcase 审批 ──────────────────────────────────────────────
  testcase-gate:
    needs: testcase
    environment: testcase-approval
    runs-on: [self-hosted, ai-runner]
    steps:
      - run: echo "✅ Test case specifications approved — generating executable test code"

  # ─── Testcase 可执行代码 ────────────────────────────────────────
  testcase-code:
    needs: [sdd-detect, testcase, testcase-gate]
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: write
    env:
      ANTHROPIC_BASE_URL: 'http://127.0.0.1:18080'
      UPSTREAM_API_URL:   'https://claude.hatch.yinxiang.com/api'
      MODEL:              'claude-sonnet-4-5-20250929'
      TEST_DIR:           'apps/tests'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start proxy (strip context_management)
        env:
          UPSTREAM_API_URL: ${{ env.UPSTREAM_API_URL }}
        run: |
          cat > /tmp/strip-proxy.js << 'EOF'
          const http = require('http'), https = require('https');
          const up = new URL(process.env.UPSTREAM_API_URL);
          http.createServer((req, res) => {
            let body = '';
            req.on('data', c => body += c);
            req.on('end', () => {
              try { const d = JSON.parse(body); delete d.context_management; body = JSON.stringify(d); } catch(e) {}
              const opts = {
                hostname: up.hostname, port: 443,
                path: up.pathname + (req.url === '/' ? '' : req.url),
                method: req.method,
                headers: { ...req.headers, host: up.hostname, 'content-length': Buffer.byteLength(body) }
              };
              const r = https.request(opts, pr => { res.writeHead(pr.statusCode, pr.headers); pr.pipe(res); });
              r.on('error', e => { res.writeHead(502); res.end(e.message); });
              r.write(body); r.end();
            });
          }).listen(18080, '127.0.0.1', () => console.log('Proxy ready on :18080'));
          EOF
          node /tmp/strip-proxy.js &
          sleep 2

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.50

      - name: Load Constitution and CLAUDE.md
        run: |
          {
            echo "CONSTITUTION<<CONSTITUTION_EOF"
            cat CONSTITUTION.md 2>/dev/null || echo "# No constitution file found"
            echo "CONSTITUTION_EOF"
          } >> "$GITHUB_ENV"
          {
            echo "CLAUDE_MD<<CLAUDE_MD_EOF"
            cat CLAUDE.md 2>/dev/null || echo "# No CLAUDE.md found"
            echo "CLAUDE_MD_EOF"
          } >> "$GITHUB_ENV"

      - name: Generate executable test code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXTRA_PROMPT: ${{ github.event.inputs.extra_prompt }}
        run: |
          export SPEC_FILES="${{ needs.sdd-detect.outputs.spec_files }}"
          export TEST_DIR="${TEST_DIR}"
          export TESTCASE_FILE="${{ needs.testcase.outputs.testcase_file }}"

          FIRST_SPEC=$(echo "$SPEC_FILES" | head -1)
          export DESIGN_FILE=$(echo "$FIRST_SPEC" | sed 's/\.md$/-design.md/')

          if ls "${TEST_DIR}"/*.spec.js 2>/dev/null | head -1 | grep -q .; then
            echo "♻️ Test specs already exist in ${TEST_DIR}, reusing"
          else
            PROMPT_TEXT=$(python3 .github/scripts/envsubst.py < .github/prompts/sdd-testcase-codegen.md)

            claude --print \
              --allowedTools "Read,Write,Bash(ls:*),Bash(find:*),Bash(mkdir:*)" \
              --model "$MODEL" \
              "${PROMPT_TEXT}

          ---

          ## 额外指令

          1. 首先读取测试用例规格文档：${TESTCASE_FILE}
          2. 读取 CLAUDE.md 了解项目测试相关技术规范（测试框架、命名规范等）
          3. 根据测试用例文档中定义的每一个测试场景，生成对应的可执行测试代码
          4. 确保每个测试用例 ID 都有对应的 test function
          5. 测试文件放在 ${TEST_DIR}/ 目录下"
          fi

      - name: Commit test code
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          git add "$TEST_DIR"

          if git diff --cached --quiet; then
            echo "ℹ️ No test code to commit."
          else
            git commit -m "sdd: generate executable test code"
            git pull --rebase origin "${{ github.ref_name }}" || true
            git push origin "HEAD:${{ github.ref_name }}"
            echo "✅ Test code committed"
          fi

  # ─── Testcase Code 审批 ─────────────────────────────────────────
  testcase-code-gate:
    needs: testcase-code
    environment: testcase-code-approval
    runs-on: [self-hosted, ai-runner]
    steps:
      - run: echo "✅ Executable test code approved"

  # ─── 触发 Quality Gate（两条线全部完成后）─────────────────────
  trigger-quality-gate:
    needs: [sdd-codegen, testcase-code-gate]
    runs-on: [self-hosted, ai-runner]
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Trigger Quality Gate Pipeline
        run: |
          gh workflow run quality-gate.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}"
          echo "✅ Quality Gate triggered on ${{ github.ref_name }}"

      - name: Post comment to Issue
        env:
          ISSUE_NUMBER: ${{ github.ref_name }}
        run: |
          ISSUE_NUMBER=$(echo "${{ github.ref_name }}" | sed 's|.*\/\([0-9]*\)-.*|\1|')
          if [ "$ISSUE_NUMBER" = "${{ github.ref_name }}" ] || [ -z "$ISSUE_NUMBER" ]; then
            echo "Not a feat/<n>-* branch — skipping comment."
            exit 0
          fi
          printf '🔍 **SDD Pipeline 已完成，Quality Gate 已触发**\n\n[查看 Quality Gate 进度](%s/%s/actions)\n' \
            "${{ github.server_url }}" "${{ github.repository }}" \
            > /tmp/quality-comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/quality-comment.md
