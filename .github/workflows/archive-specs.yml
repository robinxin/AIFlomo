name: Archive completed specs

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  archive-specs:
    if: >-
      github.event.pull_request.merged == true
      && startsWith(github.event.pull_request.head.ref, 'feat/')
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move specs to completed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD="${{ github.event.pull_request.head.ref }}"
          ISSUE_NUMBER=$(echo "$HEAD" | sed 's|feat/\([0-9]*\)-.*|\1|')

          if [ "$ISSUE_NUMBER" = "$HEAD" ] || [ -z "$ISSUE_NUMBER" ]; then
            echo "ℹ️ Not a feat/<n>-* branch — skipping spec archive."
            exit 0
          fi

          mkdir -p specs/completed
          MOVED=false

          for f in specs/active/${ISSUE_NUMBER}-*; do
            [ -f "$f" ] || continue
            echo "📦 Archiving: $f → specs/completed/"
            git mv "$f" specs/completed/
            MOVED=true
          done

          if [ "$MOVED" = true ]; then
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git commit -m "chore: archive specs for issue #${ISSUE_NUMBER}"
            git push origin main
            echo "✅ Specs archived to specs/completed/"
          else
            echo "ℹ️ No spec files found for issue #${ISSUE_NUMBER} — nothing to archive."
          fi
