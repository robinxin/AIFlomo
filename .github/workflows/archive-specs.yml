name: Archive completed specs

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      branch_name:
        description: 'Branch to destroy (e.g. feat/my-feature)'
        required: true

jobs:
  archive-specs:
    if: >-
      github.event.pull_request.merged == true
      && (startsWith(github.event.pull_request.head.ref, 'feat/')
          || startsWith(github.event.pull_request.head.ref, 'bugfix/'))
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move specs to completed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD="${{ github.event.pull_request.head.ref }}"

          mkdir -p specs/completed
          MOVED=false

          for f in specs/active/*; do
            [ -f "$f" ] || continue
            [ "$(basename "$f")" = ".gitkeep" ] && continue
            echo "📦 Archiving: $f → specs/completed/"
            git mv "$f" specs/completed/
            MOVED=true
          done

          if [ "$MOVED" = true ]; then
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git commit -m "chore: archive specs from $HEAD"
            git push origin main
            echo "✅ Specs archived to specs/completed/"
          else
            echo "ℹ️ No spec files in specs/active/ — nothing to archive."
          fi

  destroy-pod:
    needs: archive-specs
    if: >-
      always() && (
        github.event_name == 'workflow_dispatch'
        || (github.event.pull_request.merged == true
            && (startsWith(github.event.pull_request.head.ref, 'feat/')
                || startsWith(github.event.pull_request.head.ref, 'bugfix/')))
      )
    runs-on: [self-hosted, ai-runner]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Destroy feature pod
        env:
          BRANCH_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch_name || github.event.pull_request.head.ref }}
          SSH_HOST:        ${{ secrets.SSH_HOST }}
          SSH_PORT:        ${{ secrets.SSH_PORT }}
          SSH_USER:        ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH:     ${{ secrets.DEPLOY_PATH_FEAT }}
          SYSTEMD_SERVICE: ${{ secrets.SYSTEMD_SERVICE_FEAT }}
        run: |
          echo "🗑️ Destroying pod for branch: $BRANCH_NAME"
          bash scripts/destroy-pod.sh "$BRANCH_NAME"
