name: Auto Create Release PR

on:
  workflow_dispatch:
    inputs:
      base:
        description: 'Base branch to open PR into'
        default: 'main'
        required: true
      head:
        description: 'Head branch to open PR from'
        default: 'workflow-jl'
        required: true
      title:
        description: 'PR title override (optional)'
        required: false

jobs:
  create-release-pr:
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI (gh)
        run: |
          # 适配 Ubuntu 自托管 Runner，其他系统需调整
          if ! command -v gh &> /dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update && sudo apt install -y gh
          fi

      - name: Create PR if missing
        env:
          BASE: ${{ github.event.inputs.base || 'main' }}
          HEAD: ${{ github.event.inputs.head || 'workflow-jl' }}
          TITLE_OVERRIDE: ${{ github.event.inputs.title || '' }}
        run: |
          EXISTING=$(gh pr list --head "$HEAD" --base "$BASE" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR already exists: #$EXISTING"
            exit 0
          fi

          TITLE="${TITLE_OVERRIDE}"
          if [ -z "$TITLE" ]; then
            TITLE="${HEAD} -> ${BASE}"
          fi

          gh pr create \
            --base "$BASE" \
            --head "$HEAD" \
            --title "$TITLE" \
            --body "Auto-created release PR from ${HEAD}."
