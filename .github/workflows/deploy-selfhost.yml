name: Deploy to Aliyun ECS

on:
  # Code Review 人工确认通过后自动触发
  workflow_run:
    workflows: ["Code Review"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_migrate:
        description: 'Run drizzle db:migrate (yes/no)'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

jobs:
  deploy:
    name: Deploy to Aliyun ECS
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: read

    steps:
      - name: Resolve deploy branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            BRANCH="${{ github.event.workflow_run.head_branch }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi
          echo "DEPLOY_BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "Deploy branch: $BRANCH"

      - name: Verify required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.SSH_HOST }}"        ] && MISSING="$MISSING SSH_HOST"
          [ -z "${{ secrets.SSH_USER }}"        ] && MISSING="$MISSING SSH_USER"
          [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] && MISSING="$MISSING SSH_PRIVATE_KEY"
          BRANCH="${{ env.DEPLOY_BRANCH }}"
          if [[ "$BRANCH" == feat/* ]] || [[ "$BRANCH" == bugfix/* ]]; then
            [ -z "${{ secrets.DEPLOY_PATH_FEAT }}"    ] && MISSING="$MISSING DEPLOY_PATH_FEAT"
            [ -z "${{ secrets.PM2_APP_NAME_FEAT }}"   ] && MISSING="$MISSING PM2_APP_NAME_FEAT"
          elif [[ "$BRANCH" == 'workflow-di-v2' ]] || [[ "$BRANCH" == 'main' ]]; then
            [ -z "${{ secrets.DEPLOY_PATH }}"    ] && MISSING="$MISSING DEPLOY_PATH"
            [ -z "${{ secrets.PM2_APP_NAME }}"   ] && MISSING="$MISSING PM2_APP_NAME"
          fi
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Resolve deploy config
        run: |
          BRANCH="${{ env.DEPLOY_BRANCH }}"
          if [[ "$BRANCH" == feat/* ]] || [[ "$BRANCH" == bugfix/* ]]; then
            echo "DEPLOY_PATH=${{ secrets.DEPLOY_PATH_FEAT }}"    >> $GITHUB_ENV
            echo "PM2_APP_NAME=${{ secrets.PM2_APP_NAME_FEAT }}"  >> $GITHUB_ENV
          elif [[ "$BRANCH" == 'workflow-di-v2' ]] || [[ "$BRANCH" == 'main' ]]; then
            echo "DEPLOY_PATH=${{ secrets.DEPLOY_PATH }}"    >> $GITHUB_ENV
            echo "PM2_APP_NAME=${{ secrets.PM2_APP_NAME }}"  >> $GITHUB_ENV
          fi
          echo "Deploy config resolved for branch: $BRANCH"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_BRANCH }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Push code to ECS via tar+ssh
        run: |
          tar czf - \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='*.db' \
            . | \
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.SSH_PORT || 22 }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p ${{ env.DEPLOY_PATH }} && tar xzf - -C ${{ env.DEPLOY_PATH }}"

      - name: Deploy on ECS
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.SSH_PORT || 22 }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENDSSH'
          set -e

          echo "── Stop service ──────────────────────────────────"
          pm2 stop "${{ env.PM2_APP_NAME }}" || true

          echo "── Install dependencies ──────────────────────────"
          cd "${{ env.DEPLOY_PATH }}"
          npm ci

          echo "── Drizzle generate ──────────────────────────────"
          npm run db:generate -w apps/server

          echo "── Drizzle migrate ───────────────────────────────"
          if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrate == 'yes' }}" = "true" ]; then
            npm run db:migrate -w apps/server
            echo "Migration complete."
          else
            echo "Skipped migration."
          fi

          echo "── Build ─────────────────────────────────────────"
          npm run build -w apps/server

          echo "── Start service ─────────────────────────────────"
          pm2 start dist/index.js --name "${{ env.PM2_APP_NAME }}" --cwd "${{ env.DEPLOY_PATH }}/apps/server" || \
          pm2 restart "${{ env.PM2_APP_NAME }}"
          pm2 status "${{ env.PM2_APP_NAME }}"

          echo "✅ Deploy complete"
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Write step summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && BADGE="✅ Success" || BADGE="❌ Failed"
          echo "## 🚀 Deploy Result: $BADGE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Server | \`${{ secrets.SSH_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ env.DEPLOY_BRANCH }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY

  approve:
    name: Waiting for approval
    needs: deploy
    if: >-
      ${{ (github.event_name != 'workflow_run'
           || github.event.workflow_run.conclusion == 'success')
          && (github.event_name == 'workflow_run'
              || github.ref_name == 'workflow-di-v2'
              || github.ref_name == 'main'
              || startsWith(github.ref_name, 'feat/')
              || startsWith(github.ref_name, 'bugfix/')) }}
    environment: deploy-approval
    runs-on: [self-hosted, ai-runner]
    steps:
      - run: echo "Approved, deployment confirmed."
