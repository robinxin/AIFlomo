name: Deploy to Aliyun ECS

on:
  # 由 code-review.yml 的 trigger-deploy job 在审批通过后主动 dispatch
  workflow_dispatch:
    inputs:
      run_migrate:
        description: 'Run drizzle db:migrate (yes/no)'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

jobs:
  deploy:
    name: Deploy to Aliyun ECS
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: read

    steps:
      - name: Resolve deploy branch
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "DEPLOY_BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "Deploy branch: $BRANCH"

      - name: Verify required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.SSH_HOST }}"        ] && MISSING="$MISSING SSH_HOST"
          [ -z "${{ secrets.SSH_USER }}"        ] && MISSING="$MISSING SSH_USER"
          [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] && MISSING="$MISSING SSH_PRIVATE_KEY"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Resolve deploy config
        run: |
          BRANCH="${{ github.ref_name }}"
          BRANCH_DIR=$(echo "$BRANCH" | tr '/' '-')
          echo "DEPLOY_PATH=/opt/$BRANCH_DIR" >> $GITHUB_ENV

          # pm2 进程名：aiflomo-server-<branch>，aiflomo-mobile-<branch>
          PM2_SERVER_NAME="aiflomo-server-${BRANCH_DIR}"
          PM2_MOBILE_NAME="aiflomo-mobile-${BRANCH_DIR}"
          echo "PM2_SERVER_NAME=$PM2_SERVER_NAME" >> $GITHUB_ENV
          echo "PM2_MOBILE_NAME=$PM2_MOBILE_NAME" >> $GITHUB_ENV

          # main 分支使用固定端口；非 main 分支从注册表动态分配
          # 注册表格式（存于 ECS /opt/port-registry.json）：
          # {
          #   "feat/test":  [8083, 3001],   # [frontend_port, backend_port]
          #   "f": [8083, 8084, ...],        # 所有已分配的前端端口（非 main）
          #   "b": [3001, 3002, ...]         # 所有已分配的后端端口（非 main）
          # }
          if [ "$BRANCH" = "main" ]; then
            echo "FRONTEND_PORT=8082" >> $GITHUB_ENV
            echo "BACKEND_PORT=3000"  >> $GITHUB_ENV
            echo "Main branch: fixed ports frontend=8082 backend=3000"
          else
            REGISTRY=$(ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.SSH_PORT || 22 }} \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
              "cat /opt/port-registry.json 2>/dev/null || echo '{}'")
            [ -z "$REGISTRY" ] && REGISTRY='{}'

            # 检查分支是否已有端口分配
            EXISTING=$(echo "$REGISTRY" | jq -r --arg b "$BRANCH" '.[$b] // empty')

            if [ -n "$EXISTING" ]; then
              FRONTEND_PORT=$(echo "$REGISTRY" | jq -r --arg b "$BRANCH" '.[$b][0]')
              BACKEND_PORT=$(echo "$REGISTRY"  | jq -r --arg b "$BRANCH" '.[$b][1]')
              echo "Reusing existing ports: frontend=$FRONTEND_PORT backend=$BACKEND_PORT"
            else
              # 非 main 分支：前端从 8083 起，后端从 3001 起
              FRONTEND_PORT=$(echo "$REGISTRY" | jq \
                '(.["f"] // []) as $used | [range(8083; 9000) | select(. as $p | ($used | contains([$p])) | not)] | .[0]')
              BACKEND_PORT=$(echo "$REGISTRY" | jq \
                '(.["b"] // []) as $used | [range(3001; 4000) | select(. as $p | ($used | contains([$p])) | not)] | .[0]')

              # 写回注册表：更新分支条目 + 追加到已用端口列表
              NEW_REGISTRY=$(echo "$REGISTRY" | jq \
                --arg b "$BRANCH" \
                --argjson fp "$FRONTEND_PORT" \
                --argjson bp "$BACKEND_PORT" \
                '
                .[$b] = [$fp, $bp] |
                .["f"] = ((.["f"] // []) | if contains([$fp]) then . else . + [$fp] end) |
                .["b"] = ((.["b"] // []) | if contains([$bp]) then . else . + [$bp] end)
                ')
              echo "$NEW_REGISTRY" | ssh -i ~/.ssh/deploy_key \
                -p ${{ secrets.SSH_PORT || 22 }} \
                -o StrictHostKeyChecking=no \
                ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
                "cat > /opt/port-registry.json"
              echo "Allocated new ports: frontend=$FRONTEND_PORT backend=$BACKEND_PORT"
            fi

            echo "FRONTEND_PORT=$FRONTEND_PORT" >> $GITHUB_ENV
            echo "BACKEND_PORT=$BACKEND_PORT"   >> $GITHUB_ENV
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Push code to ECS
        run: |
          COPYFILE_DISABLE=1 tar czf - \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='*.db' \
            --exclude='._*' \
            . | \
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.SSH_PORT || 22 }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "mkdir -p ${{ env.DEPLOY_PATH }} && tar xzf - -C ${{ env.DEPLOY_PATH }}"

      - name: Deploy on ECS
        env:
          DEPLOY_PATH:     ${{ env.DEPLOY_PATH }}
          BACKEND_PORT:    ${{ env.BACKEND_PORT }}
          FRONTEND_PORT:   ${{ env.FRONTEND_PORT }}
          PM2_SERVER_NAME: ${{ env.PM2_SERVER_NAME }}
          PM2_MOBILE_NAME: ${{ env.PM2_MOBILE_NAME }}
          RUN_MIGRATE:     ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrate == 'yes' }}
          SESSION_SECRET:  ${{ secrets.SESSION_SECRET }}
          SSH_HOST:        ${{ secrets.SSH_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.SSH_PORT || 22 }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            DEPLOY_PATH="$DEPLOY_PATH" \
            BACKEND_PORT="$BACKEND_PORT" \
            FRONTEND_PORT="$FRONTEND_PORT" \
            PM2_SERVER_NAME="$PM2_SERVER_NAME" \
            PM2_MOBILE_NAME="$PM2_MOBILE_NAME" \
            RUN_MIGRATE="$RUN_MIGRATE" \
            SESSION_SECRET="$SESSION_SECRET" \
            SSH_HOST="$SSH_HOST" \
            bash << 'ENDSSH'
          set -e

          # SSH 非交互式 shell 不加载 ~/.bashrc，手动 source nvm 确保 node/npm/pm2 可用
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
          export PATH="$PATH:$(npm prefix -g)/bin"

          SERVER_DIR="$DEPLOY_PATH/apps/server"

          echo "── Branch deploy config ──────────────────────────"
          echo "  DEPLOY_PATH:     $DEPLOY_PATH"
          echo "  BACKEND_PORT:    $BACKEND_PORT"
          echo "  FRONTEND_PORT:   $FRONTEND_PORT"
          echo "  PM2_SERVER_NAME: $PM2_SERVER_NAME"
          echo "  PM2_MOBILE_NAME: $PM2_MOBILE_NAME"

          echo "── Clean macOS metadata files ────────────────────"
          find "$DEPLOY_PATH" -name '._*' -delete 2>/dev/null || true

          echo "── Verify Node.js version (>= 20 required) ──────"
          NODE_MAJOR=$(node --version | cut -d. -f1 | tr -d 'v')
          if [ "$NODE_MAJOR" -lt 20 ]; then
            echo "::error::Node.js >= 20 required, found $(node --version)"
            exit 1
          fi
          echo "Node.js $(node --version) OK"

          echo "── Ensure build tools (g++ for better-sqlite3) ──"
          command -v g++ >/dev/null 2>&1 || sudo yum install -y gcc-c++ make

          echo "── Ensure data directory ─────────────────────────"
          mkdir -p "$SERVER_DIR/data"

          echo "── Ensure .env file ──────────────────────────────"
          ENV_FILE="$SERVER_DIR/.env"
          if [ ! -f "$ENV_FILE" ]; then
            SECRET="${SESSION_SECRET:-$(openssl rand -hex 32)}"
            printf 'NODE_ENV=production\nPORT=%s\nSESSION_SECRET=%s\nDB_PATH=./data/aiflomo.db\nCORS_ORIGIN=http://%s:%s\n' \
              "$BACKEND_PORT" "$SECRET" "$SSH_HOST" "$FRONTEND_PORT" > "$ENV_FILE"
            echo "Created $ENV_FILE"
          else
            echo ".env already exists, updating PORT and CORS_ORIGIN"
            sed -i "s/^PORT=.*/PORT=$BACKEND_PORT/" "$ENV_FILE"
            sed -i "s|^CORS_ORIGIN=.*|CORS_ORIGIN=http://$SSH_HOST:$FRONTEND_PORT|" "$ENV_FILE"
          fi

          echo "── Install dependencies ──────────────────────────"
          cd "$DEPLOY_PATH"
          if [ ! -d node_modules ] || [ package-lock.json -nt node_modules ]; then
            npm install
          else
            echo "node_modules up to date, skipping install"
          fi

          echo "── Drizzle generate ──────────────────────────────"
          npm run db:generate -w apps/server

          echo "── Drizzle migrate ───────────────────────────────"
          if [ "$RUN_MIGRATE" = "true" ]; then
            npm run db:migrate -w apps/server
            echo "Migration complete."
          else
            echo "Skipped migration (pass run_migrate=yes to run)."
          fi

          echo "── Lint check ────────────────────────────────────"
          npm run lint -w apps/server
          npm run lint -w apps/mobile

          echo "── Build frontend ────────────────────────────────"
          EXPO_USE_METRO_WORKSPACE_ROOT=1 \
          EXPO_PUBLIC_API_URL="http://$SSH_HOST:$BACKEND_PORT" \
            npm run build -w apps/mobile

          echo "── Start services (pm2) ──────────────────────────"
          cd "$DEPLOY_PATH"

          # 如果端口被非预期进程占用，先 kill
          free_port() {
            local PORT=$1
            local PIDS
            PIDS=$(lsof -ti :"$PORT" 2>/dev/null || true)
            if [ -n "$PIDS" ]; then
              echo "Port $PORT in use by PID(s) $PIDS — killing"
              echo "$PIDS" | xargs kill -9 2>/dev/null || true
              sleep 1
            fi
          }

          # 启动后验证进程是否 online，失败则打印日志并退出
          pm2_verify() {
            local NAME=$1
            sleep 2
            if pm2 describe "$NAME" 2>/dev/null | grep -q "online"; then
              echo "✓ $NAME is online"
            else
              echo "::error::pm2 process '$NAME' is not online"
              pm2 logs "$NAME" --lines 30 --nostream 2>/dev/null || true
              exit 1
            fi
          }

          free_port "$BACKEND_PORT"
          pm2 delete "$PM2_SERVER_NAME" 2>/dev/null || true
          pm2 delete aiflomo-server 2>/dev/null || true
          pm2 start "$DEPLOY_PATH/apps/server/src/index.js" \
            --name "$PM2_SERVER_NAME" \
            --cwd "$DEPLOY_PATH/apps/server" \
            -f
          pm2_verify  "$PM2_SERVER_NAME"

          free_port "$FRONTEND_PORT"
          pm2 delete "$PM2_MOBILE_NAME" 2>/dev/null || true
          pm2 start "npx serve dist -l $FRONTEND_PORT --single" \
            --name "$PM2_MOBILE_NAME" \
            --cwd "$DEPLOY_PATH/apps/mobile"
          pm2_verify  "$PM2_MOBILE_NAME"

          pm2 save
          pm2 list

          echo "✅ Deploy complete — backend :$BACKEND_PORT / frontend :$FRONTEND_PORT"
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Write step summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && BADGE="✅ Success" || BADGE="❌ Failed"
          echo "## 🚀 Deploy Result: $BADGE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ env.DEPLOY_BRANCH }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY

  # ─── Deploy 成功 → 触发 Create Release PR ───────────────────────
  trigger-create-pr:
    needs: deploy
    # main 分支不需要 PR；只对 feat/* 和 bugfix/* 触发
    if: success() && (startsWith(github.ref_name, 'feat/') || startsWith(github.ref_name, 'bugfix/'))
    runs-on: [self-hosted, ai-runner]
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Dispatch create-pr
        run: |
          gh workflow run create-pr.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}"
          echo "✅ Create PR triggered on ${{ github.ref_name }}"
