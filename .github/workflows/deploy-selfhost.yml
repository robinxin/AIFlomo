name: Deploy to Aliyun ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_migrate:
        description: 'Run prisma migrate deploy (yes/no)'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

jobs:
  deploy:
    name: Deploy to Aliyun ECS
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: read

    steps:
      - name: Verify required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.SSH_HOST }}"        ] && MISSING="$MISSING SSH_HOST"
          [ -z "${{ secrets.SSH_USER }}"        ] && MISSING="$MISSING SSH_USER"
          [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ] && MISSING="$MISSING SSH_PRIVATE_KEY"
          [ -z "${{ secrets.DEPLOY_PATH }}"     ] && MISSING="$MISSING DEPLOY_PATH"
          [ -z "${{ secrets.SYSTEMD_SERVICE }}" ] && MISSING="$MISSING SYSTEMD_SERVICE"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING"
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT || 22 }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Rsync code to ECS
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='*.db' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT || 22 }} -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/

      - name: Deploy on ECS
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.SSH_PORT || 22 }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash << 'ENDSSH'
          set -e

          echo "── Stop service ──────────────────────────────────"
          sudo systemctl stop "${{ secrets.SYSTEMD_SERVICE }}" || true

          echo "── Install dependencies ──────────────────────────"
          cd "${{ secrets.DEPLOY_PATH }}/apps/flomo"
          npm ci

          echo "── Prisma generate ───────────────────────────────"
          npx prisma generate

          echo "── Prisma migrate ────────────────────────────────"
          if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrate == 'yes' }}" = "true" ]; then
            npx prisma migrate deploy
            echo "Migration complete."
          else
            echo "Skipped migration."
          fi

          echo "── Build ─────────────────────────────────────────"
          npm run build

          echo "── Start service ─────────────────────────────────"
          sudo systemctl start "${{ secrets.SYSTEMD_SERVICE }}"
          sudo systemctl is-active "${{ secrets.SYSTEMD_SERVICE }}"

          echo "✅ Deploy complete"
          ENDSSH

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Write step summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [ "$STATUS" = "success" ] && BADGE="✅ Success" || BADGE="❌ Failed"
          echo "## 🚀 Deploy Result: $BADGE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Server | \`${{ secrets.SSH_HOST }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
