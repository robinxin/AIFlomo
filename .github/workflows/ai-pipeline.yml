name: AI Pipeline (Spec -> SDD -> Quality -> Release PR)

on:
  push:
    branches: [feat/lss]
    paths:
      - 'specs/active/**/*'
      - 'apps/flomo/app/**/*'
      - 'apps/flomo/lib/**/*'
      - 'apps/flomo/tests/**/*'
  pull_request:
    branches: [main-new]
    paths:
      - 'specs/active/**/*'
      - 'apps/flomo/app/**/*'
      - 'apps/flomo/lib/**/*'
      - 'apps/flomo/tests/**/*'
  workflow_dispatch:
    inputs:
      run_sdd:
        description: 'Run SDD (1=yes, 0=no)'
        default: '1'
        required: true
      run_quality:
        description: 'Run quality gate (1=yes, 0=no)'
        default: '1'
        required: true
      run_release_pr:
        description: 'Create release PR (1=yes, 0=no)'
        default: '1'
        required: true

jobs:
  detect:
    runs-on: [self-hosted, ai-runner]
    outputs:
      spec_changed: ${{ steps.detect.outputs.spec_changed }}
      spec_files_list: ${{ steps.detect.outputs.spec_files_list }}
      changed_specs: ${{ steps.detect.outputs.changed_specs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed spec files
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- specs/active/ || true)
          elif [ "${{ github.event_name }}" = "push" ] && git cat-file -e "${{ github.event.before }}"^{commit} 2>/dev/null; then
            files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- specs/active/ || true)
          else
            files=$(ls specs/active 2>/dev/null | sed 's#^#specs/active/#' || true)
          fi

          if [ -n "$files" ]; then
            echo "spec_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "spec_changed=false" >> "$GITHUB_OUTPUT"
          fi

          printf "changed_specs<<EOF\n%s\nEOF\n" "$files" >> "$GITHUB_OUTPUT"
          echo "spec_files_list=$(echo "$files" | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"

  sdd:
    needs: detect
    if: >-
      ${{ needs.detect.outputs.spec_changed == 'true'
          && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
          && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_sdd == '1') }}
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    env:
      CODE_GEN_DIR: 'apps/flomo/app/'
      TEST_GEN_DIR: 'apps/flomo/tests/'
      ANTHROPIC_BASE_URL: 'https://claude.hatch.yinxiang.com/api'
    steps:
      - name: Checkout code & spec
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitHub CLI (gh)
        run: |
          if command -v gh &> /dev/null; then
            exit 0
          fi

          if [ "${{ runner.os }}" = "Linux" ]; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update && sudo apt install -y gh
            exit 0
          fi

          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install gh
            exit 0
          fi

          echo "Unsupported runner OS for gh install: ${{ runner.os }}"
          exit 1

      - name: Detect Changed Spec Files
        id: detect-spec-files
        run: |
          CHANGED_SPEC_FILES=""
          SPEC_CONTENT=""

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" | grep '^specs/active/.*\.\(md\|yaml\|yml\|json\)$')
          elif [ "${{ github.event_name }}" = "push" ]; then
            CHANGED_FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^specs/active/.*\.\(md\|yaml\|yml\|json\)$')
          else
            CHANGED_FILES=$(ls specs/active 2>/dev/null | sed 's#^#specs/active/#' | grep -E '\.(md|yaml|yml|json)$' || true)
          fi

          CHANGED_SPEC_FILES=$(echo "$CHANGED_FILES" | sort | uniq | grep -E '^specs/active/.*\.(md|yaml|yml|json)$')

          if [ -z "$CHANGED_SPEC_FILES" ]; then
            echo "❌ No changed spec files found in specs/active/**/*, aborting workflow!"
            exit 1
          fi

          for FILE in $CHANGED_SPEC_FILES; do
            if [ ! -f "$FILE" ]; then
              echo "❌ Spec file $FILE not found, aborting workflow!"
              exit 1
            fi
          done

          for FILE in $CHANGED_SPEC_FILES; do
            echo "📄 Reading spec file: $FILE"
            FILE_CONTENT=$(cat "$FILE" | awk '{gsub(/"/, "\\\""); print}' | tr '\n' '\\n')
            SPEC_CONTENT+="### Spec File: $FILE\n$FILE_CONTENT\n\n"
          done

          {
            echo "changed_spec_files<<EOF"
            echo "$CHANGED_SPEC_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "spec_content<<EOF"
            echo "$SPEC_CONTENT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "spec_files_list=$(echo "$CHANGED_SPEC_FILES" | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"

      - name: Step 1 - Review Spec Rationality
        id: review-spec
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          prompt: |
            ### CHANGED SPEC FILES
            ${{ steps.detect-spec-files.outputs.spec_files_list }}

            ### SPECIFICATION CONTENT (Combined)
            ${{ steps.detect-spec-files.outputs.spec_content }}

            ### TASK: Spec Rationality Review
            Analyze the above changed spec files for SDD (Specification-Driven Development) and output:
            1. **Completeness**: List missing parts for EACH changed file (e.g., "api_spec.md: no input/output definition for User API")
            2. **Ambiguity**: Highlight vague descriptions for EACH changed file (e.g., "db_spec.yml: 'fast query' without response time metrics")
            3. **Logical Conflicts**: Point out contradictory rules BETWEEN changed files (if multiple)
            4. **Improvement Suggestions**: Specific, actionable changes to make each spec clear/complete

            ### RULES
            - Be objective and specific (avoid vague comments)
            - Prioritize critical issues (e.g., missing core function definitions)
            - Clearly link all issues to the corresponding spec file name
            - If spec has fatal flaws (e.g., empty core function definition), explicitly mark as "CRITICAL"
          claude_args: "--allowedTools ''"

      - name: Generate Spec Fix Suggestion Files
        id: gen-spec-fix
        if: steps.review-spec.outcome == 'success'
        env:
          SPEC_REVIEW_RESULT: ${{ steps.review-spec.outputs.review-result }}
          CHANGED_SPEC_FILES: ${{ steps.detect-spec-files.outputs.changed_spec_files }}
        run: |
          if [ -z "$SPEC_REVIEW_RESULT" ]; then
            echo "❌ Empty Spec review result, aborting workflow!"
            exit 1
          fi

          for FILE in $CHANGED_SPEC_FILES; do
            case "$FILE" in
              *.md) FIX_FILE="${FILE%.md}.fix.md" ;;
              *.yaml|*.yml) FIX_FILE="${FILE%.*}.fix.yml" ;;
              *.json) FIX_FILE="${FILE%.json}.fix.json" ;;
              *) FIX_FILE="$FILE.fix" ;;
            esac

            echo "# Spec Fix Suggestion: $FILE" > "$FIX_FILE"
            echo "## Generated at: $(date)" >> "$FIX_FILE"
            echo "## Review Result for $FILE" >> "$FIX_FILE"
            echo -e "\n$SPEC_REVIEW_RESULT" >> "$FIX_FILE"

            echo "✅ Fix suggestion file created: $FIX_FILE"
          done

          FIX_FILES=$(ls specs/active/*.fix.* 2>/dev/null | tr '\n' ',' | sed 's/,$//')
          echo "spec_fix_files=$FIX_FILES" >> "$GITHUB_OUTPUT"

      - name: Step 2 - Generate Code from Spec
        id: gen-code
        if: steps.review-spec.outcome == 'success'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          prompt: |
            ### CHANGED SPEC FILES
            ${{ steps.detect-spec-files.outputs.spec_files_list }}

            ### COMBINED SPEC CONTENT
            ${{ steps.detect-spec-files.outputs.spec_content }}

            ### TASK: Generate Code from Spec (SDD)
            Generate production-ready code based on ALL changed spec files, following these strict rules:
            1. Save code to directory: ${{ env.CODE_GEN_DIR }} (create subdirectories if needed to map to spec files)
            2. Use the same programming language as existing code in apps/flomo/app/ (detect automatically from file extensions)
            3. Follow the spec's interface/parameter/return value rules strictly (no deviations)
            4. Add clear comments linking code to specific spec files/sections (e.g., "# From api_spec.md: User API Endpoint - Input Validation")
            5. Generate only the code defined in the spec (no extra functionality or debug code)
            6. Ensure consistency across code generated from multiple spec files

            ### OUTPUT REQUIREMENT
            First output a summary of generated files (with full paths), then output the complete code for each file (enclosed in ```language ... ``` blocks with file path as header).
          claude_args: |
            --allowedTools "Bash(mkdir:*),Bash(cat:*),Bash(ls:*),Bash(file:*)"

      - name: Step 3 - Generate Test Cases from Spec
        id: gen-test
        if: steps.gen-code.outcome == 'success'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          prompt: |
            ### CHANGED SPEC FILES
            ${{ steps.detect-spec-files.outputs.spec_files_list }}

            ### COMBINED SPEC CONTENT
            ${{ steps.detect-spec-files.outputs.spec_content }}

            ### GENERATED CODE SUMMARY
            ${{ steps.gen-code.outputs.review-result }}

            ### TASK: Generate Test Cases from Spec (SDD)
            Generate comprehensive unit test cases based on the changed spec files and generated code, following these rules:
            1. Save test cases to directory: ${{ env.TEST_GEN_DIR }} (mirror the directory structure of generated code)
            2. Align test framework with existing tests in apps/flomo/tests/ (detect automatically from file extensions)
            3. Cover ALL functions/rules defined in the spec (include positive, negative, and edge cases)
            4. Link each test case to the corresponding spec file/section (e.g., "# Test for db_spec.yml: User Table - Unique Constraint")
            5. Ensure test cases are fully runnable (valid syntax, correct imports, no missing dependencies)
            6. Include assertions that validate compliance with spec requirements (not just code functionality)

            ### OUTPUT REQUIREMENT
            First output a summary of generated test files (with full paths), then output the complete test code for each file (enclosed in ```language ... ``` blocks with file path as header).
          claude_args: |
            --allowedTools "Bash(mkdir:*),Bash(cat:*),Bash(ls:*),Bash(file:*)"

      - name: Write Generated Code & Tests to Files
        id: write-files
        env:
          CODE_GEN_RESULT: ${{ steps.gen-code.outputs.review-result }}
          TEST_GEN_RESULT: ${{ steps.gen-test.outputs.review-result }}
          CODE_GEN_DIR: ${{ env.CODE_GEN_DIR }}
          TEST_GEN_DIR: ${{ env.TEST_GEN_DIR }}
        run: |
          if [ -z "$CODE_GEN_RESULT" ]; then
            echo "❌ Empty code generation result, aborting workflow!"
            exit 1
          fi

          if [ -z "$TEST_GEN_RESULT" ]; then
            echo "❌ Empty test generation result, aborting workflow!"
            exit 1
          fi

          mkdir -p "$CODE_GEN_DIR" "$TEST_GEN_DIR"

          echo "🔧 Extracting generated code..."
          echo "$CODE_GEN_RESULT" | awk '/```/{f=!f; if(f) {file=""; next} else {if(file!="") close(file); file=""}; next} f {if(file=="") {file=CODE_GEN_DIR "/" $0; print "Creating code file: " file} else {print >> file}}'

          echo "🔧 Extracting generated test cases..."
          echo "$TEST_GEN_RESULT" | awk '/```/{f=!f; if(f) {file=""; next} else {if(file!="") close(file); file=""}; next} f {if(file=="") {file=TEST_GEN_DIR "/" $0; print "Creating test file: " file} else {print >> file}}'

          CODE_FILE_COUNT=$(ls -l "$CODE_GEN_DIR" | grep -v '^total' | wc -l)
          TEST_FILE_COUNT=$(ls -l "$TEST_GEN_DIR" | grep -v '^total' | wc -l)

          if [ "$CODE_FILE_COUNT" -eq 0 ]; then
            echo "❌ No code files generated, aborting workflow!"
            exit 1
          fi

          if [ "$TEST_FILE_COUNT" -eq 0 ]; then
            echo "❌ No test files generated, aborting workflow!"
            exit 1
          fi

          echo "✅ Generated $CODE_FILE_COUNT code files in $CODE_GEN_DIR"
          echo "✅ Generated $TEST_FILE_COUNT test files in $TEST_GEN_DIR"
          echo "code_files=$(ls $CODE_GEN_DIR | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"
          echo "test_files=$(ls $TEST_GEN_DIR | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"
          echo "code_file_count=$CODE_FILE_COUNT" >> "$GITHUB_OUTPUT"
          echo "test_file_count=$TEST_FILE_COUNT" >> "$GITHUB_OUTPUT"

      - name: Commit Generated Files
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODE_GEN_DIR: ${{ env.CODE_GEN_DIR }}
          TEST_GEN_DIR: ${{ env.TEST_GEN_DIR }}
          CHANGED_SPEC_FILES: ${{ steps.detect-spec-files.outputs.changed_spec_files }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git add "$CODE_GEN_DIR" "$TEST_GEN_DIR" specs/active/*.fix.*

          if git diff --cached --quiet; then
            echo "ℹ️ No generated files to commit, skipping commit step."
          else
            git commit -m "SDD: Auto-generate code/tests/spec-fix from changed spec files (${{ github.sha }})"
            git push origin ${{ github.ref_name }}
            echo "✅ Generated files committed to ${{ github.ref_name }}"
          fi

      - name: Publish All SDD Results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPEC_REVIEW_RESULT: ${{ steps.review-spec.outputs.review-result }}
          SPEC_FIX_FILES: ${{ steps.gen-spec-fix.outputs.spec_fix_files || 'None' }}
          CODE_GEN_SUMMARY: "Generated files: ${{ steps.write-files.outputs.code_files }} (Total: ${{ steps.write-files.outputs.code_file_count }})"
          TEST_GEN_SUMMARY: "Generated test files: ${{ steps.write-files.outputs.test_files }} (Total: ${{ steps.write-files.outputs.test_file_count }})"
          PR_NUMBER: ${{ github.event.pull_request.number || 'none' }}
          COMMIT_SHA: ${{ github.sha }}
          SPEC_FILES_LIST: ${{ steps.detect-spec-files.outputs.spec_files_list }}
        run: |
          SPEC_REVIEW_RESULT=${SPEC_REVIEW_RESULT:-"⚠️ No Spec review result returned."}

          FINAL_RESULT="## 📋 SDD Full Lifecycle Result
          - Commit SHA: $COMMIT_SHA
          - Changed Spec Files: $SPEC_FILES_LIST
          - Spec Fix Files: $SPEC_FIX_FILES
          - Code Gen Directory: ${{ env.CODE_GEN_DIR }}
          - Test Gen Directory: ${{ env.TEST_GEN_DIR }}

          ### 1. Spec Rationality Review
          $SPEC_REVIEW_RESULT

          ### 2. Code Generation Summary
          $CODE_GEN_SUMMARY

          ### 3. Test Case Generation Summary
          $TEST_GEN_SUMMARY

          > Notes:
          > - Generated files are committed to the repository (Push event only).
          > - Spec fix suggestions are saved to specs/active/*.fix.* files (original spec files are NOT modified).
          > - Workflow aborts immediately on any step failure (strict mode)."

          if [ "$PR_NUMBER" != "none" ]; then
            gh pr comment "$PR_NUMBER" --body "$FINAL_RESULT"
            echo "✅ SDD results published to PR #$PR_NUMBER comments"
          else
            gh issue create \
              --title "SDD Full Lifecycle: $COMMIT_SHA (Spec: $SPEC_FILES_LIST)" \
              --body "$FINAL_RESULT" \
              --label "sdd-full-lifecycle,claude-official,auto-gen,strict-mode"
            echo "✅ SDD results published to new Issue"
          fi

  quality:
    needs: [detect, sdd]
    if: >-
      ${{ needs.sdd.result != 'failure'
          && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_quality == '1') }}
    runs-on: [self-hosted, ai-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/flomo/package-lock.json

      - name: Install dependencies
        working-directory: apps/flomo
        run: npm install

      - name: Prisma generate
        working-directory: apps/flomo
        run: npm run db:generate

      - name: npm audit (critical only)
        working-directory: apps/flomo
        run: npm audit --audit-level=critical

      - name: Build
        working-directory: apps/flomo
        run: npm run build

      - name: Test (coverage gate)
        working-directory: apps/flomo
        run: npm run test:coverage

  release-pr:
    needs: quality
    if: >-
      ${{ github.event_name != 'pull_request'
          && needs.quality.result == 'success'
          && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_release_pr == '1') }}
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI (gh)
        run: |
          if command -v gh &> /dev/null; then
            exit 0
          fi

          if [ "${{ runner.os }}" = "Linux" ]; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update && sudo apt install -y gh
            exit 0
          fi

          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install gh
            exit 0
          fi

          echo "Unsupported runner OS for gh install: ${{ runner.os }}"
          exit 1

      - name: Create PR if missing
        env:
          BASE: main-new
          HEAD: feat/lss
        run: |
          EXISTING=$(gh pr list --head "$HEAD" --base "$BASE" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR already exists: #$EXISTING"
            exit 0
          fi

          gh pr create \
            --base "$BASE" \
            --head "$HEAD" \
            --title "${HEAD} -> ${BASE}" \
            --body "Auto-created release PR from ${HEAD}."
