name: AI Pipeline (Spec -> SDD -> Quality -> Release PR)

on:
  push:
    branches: [feat/lss]
    paths:
      - 'specs/active/**/*'
      - 'apps/flomo/app/**/*'
      - 'apps/flomo/lib/**/*'
      - 'apps/flomo/tests/**/*'
  pull_request:
    branches: [main-new]
    paths:
      - 'specs/active/**/*'
      - 'apps/flomo/app/**/*'
      - 'apps/flomo/lib/**/*'
      - 'apps/flomo/tests/**/*'
  workflow_dispatch:
    inputs:
      run_sdd:
        description: 'Run SDD (1=yes, 0=no)'
        default: '1'
        required: true
      run_quality:
        description: 'Run quality gate (1=yes, 0=no)'
        default: '1'
        required: true
      run_release_pr:
        description: 'Create release PR (1=yes, 0=no)'
        default: '1'
        required: true

jobs:
  detect:
    runs-on: [self-hosted, ai-runner]
    outputs:
      spec_changed: ${{ steps.detect.outputs.spec_changed }}
      spec_files_list: ${{ steps.detect.outputs.spec_files_list }}
      changed_specs: ${{ steps.detect.outputs.changed_specs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed spec files
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- specs/active/ || true)
          elif [ "${{ github.event_name }}" = "push" ] && git cat-file -e "${{ github.event.before }}"^{commit} 2>/dev/null; then
            files=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- specs/active/ || true)
          else
            files=$(ls specs/active 2>/dev/null | sed 's#^#specs/active/#' || true)
          fi

          if [ -n "$files" ]; then
            echo "spec_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "spec_changed=false" >> "$GITHUB_OUTPUT"
          fi

          printf "changed_specs<<EOF\n%s\nEOF\n" "$files" >> "$GITHUB_OUTPUT"
          echo "spec_files_list=$(echo "$files" | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"

  sdd:
    needs: detect
    if: >-
      ${{ needs.detect.outputs.spec_changed == 'true'
          && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
          && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_sdd == '1') }}
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    env:
      CODE_GEN_DIR: 'apps/flomo/app/'
      TEST_GEN_DIR: 'apps/flomo/tests/'
      ANTHROPIC_BASE_URL: 'http://127.0.0.1:18080'
      UPSTREAM_API_URL: 'https://claude.hatch.yinxiang.com/api'
    steps:
      - name: Checkout code & spec
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitHub CLI (gh)
        run: |
          if command -v gh &> /dev/null; then
            exit 0
          fi

          if [ "${{ runner.os }}" = "Linux" ]; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update && sudo apt install -y gh
            exit 0
          fi

          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install gh
            exit 0
          fi

          echo "Unsupported runner OS for gh install: ${{ runner.os }}"
          exit 1

      - name: Start context_management stripping proxy
        env:
          UPSTREAM_API_URL: ${{ env.UPSTREAM_API_URL }}
        run: |
          cat > /tmp/strip-proxy.js << 'PROXYEOF'
          const http = require('http');
          const https = require('https');
          const upstreamUrl = new URL(process.env.UPSTREAM_API_URL);
          http.createServer((req, res) => {
            let body = '';
            req.on('data', c => body += c);
            req.on('end', () => {
              try {
                const d = JSON.parse(body);
                delete d.context_management;
                body = JSON.stringify(d);
              } catch(e) {}
              const opts = {
                hostname: upstreamUrl.hostname,
                port: 443,
                path: upstreamUrl.pathname + (req.url === '/' ? '' : req.url),
                method: req.method,
                headers: {
                  ...req.headers,
                  host: upstreamUrl.hostname,
                  'content-length': Buffer.byteLength(body)
                }
              };
              const r = https.request(opts, pr => {
                res.writeHead(pr.statusCode, pr.headers);
                pr.pipe(res);
              });
              r.on('error', e => { res.writeHead(502); res.end(e.message); });
              r.write(body);
              r.end();
            });
          }).listen(18080, '127.0.0.1', () => console.log('Proxy listening on 127.0.0.1:18080'));
          PROXYEOF
          node /tmp/strip-proxy.js &
          sleep 2

      - name: Verify proxy strips context_management
        run: |
          # 发一个带 context_management 的请求给本地代理，上游不应再返回 400
          RESPONSE=$(curl -s -o /tmp/proxy-test-response.json -w "%{http_code}" \
            http://127.0.0.1:18080/v1/messages \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -d '{"model":"claude-sonnet-4-5-20250929","max_tokens":5,"messages":[{"role":"user","content":"hi"}],"context_management":{"type":"enabled"}}')
          echo "HTTP status: $RESPONSE"
          cat /tmp/proxy-test-response.json
          if [ "$RESPONSE" = "400" ]; then
            echo "❌ Proxy is NOT stripping context_management, upstream still returns 400"
            exit 1
          fi
          echo "✅ Proxy is working, context_management was stripped"

      - name: Install Claude Code 2.1.50
        id: install-claude
        run: |
          npm install -g @anthropic-ai/claude-code@2.1.50
          echo "claude_path=$(which claude)" >> "$GITHUB_OUTPUT"

      - name: Detect Changed Spec Files
        id: detect-spec-files
        run: |
          CHANGED_SPEC_FILES=""
          SPEC_CONTENT=""

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" | grep '^specs/active/.*\.\(md\|yaml\|yml\|json\)$')
          elif [ "${{ github.event_name }}" = "push" ]; then
            CHANGED_FILES=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^specs/active/.*\.\(md\|yaml\|yml\|json\)$')
          else
            CHANGED_FILES=$(ls specs/active 2>/dev/null | sed 's#^#specs/active/#' | grep -E '\.(md|yaml|yml|json)$' || true)
          fi

          CHANGED_SPEC_FILES=$(echo "$CHANGED_FILES" | sort | uniq | grep -E '^specs/active/.*\.(md|yaml|yml|json)$')

          if [ -z "$CHANGED_SPEC_FILES" ]; then
            echo "❌ No changed spec files found in specs/active/**/*, aborting workflow!"
            exit 1
          fi

          for FILE in $CHANGED_SPEC_FILES; do
            if [ ! -f "$FILE" ]; then
              echo "❌ Spec file $FILE not found, aborting workflow!"
              exit 1
            fi
          done

          for FILE in $CHANGED_SPEC_FILES; do
            echo "📄 Reading spec file: $FILE"
            FILE_CONTENT=$(cat "$FILE" | awk '{gsub(/"/, "\\\""); print}' | tr '\n' '\\n')
            SPEC_CONTENT+="### Spec File: $FILE\n$FILE_CONTENT\n\n"
          done

          {
            echo "changed_spec_files<<EOF"
            echo "$CHANGED_SPEC_FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "spec_content<<EOF"
            echo "$SPEC_CONTENT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "spec_files_list=$(echo "$CHANGED_SPEC_FILES" | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"

      - name: Step 1 - Review Spec Rationality
        id: review-spec
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          path_to_claude_code_executable: ${{ steps.install-claude.outputs.claude_path }}
          prompt: |
            ### CHANGED SPEC FILES
            ${{ steps.detect-spec-files.outputs.spec_files_list }}

            ### SPECIFICATION CONTENT (Combined)
            ${{ steps.detect-spec-files.outputs.spec_content }}

            ### TASK: Spec Rationality Review
            Analyze the above changed spec files for SDD (Specification-Driven Development) and output:
            1. **Completeness**: List missing parts for EACH changed file (e.g., "api_spec.md: no input/output definition for User API")
            2. **Ambiguity**: Highlight vague descriptions for EACH changed file (e.g., "db_spec.yml: 'fast query' without response time metrics")
            3. **Logical Conflicts**: Point out contradictory rules BETWEEN changed files (if multiple)
            4. **Improvement Suggestions**: Specific, actionable changes to make each spec clear/complete

            ### RULES
            - Be objective and specific (avoid vague comments)
            - Prioritize critical issues (e.g., missing core function definitions)
            - Clearly link all issues to the corresponding spec file name
            - If spec has fatal flaws (e.g., empty core function definition), explicitly mark as "CRITICAL"
          claude_args: "--allowedTools '' --model claude-sonnet-4-5-20250929"

      - name: Capture review result from log
        id: capture-review
        if: steps.review-spec.outcome == 'success'
        run: |
          RESULT=$(python3 - << 'PYEOF'
          import json, sys, os
          log_path = os.path.join(os.environ.get('RUNNER_TEMP', ''), 'claude-execution-output.json')
          try:
              content = open(log_path).read()
          except Exception as e:
              print(f'ERROR: Cannot open log file {log_path}: {e}', file=sys.stderr)
              sys.exit(1)
          # Try as JSON (object or array)
          try:
              data = json.loads(content)
              items = data if isinstance(data, list) else [data]
              for item in items:
                  if isinstance(item, dict) and item.get('type') == 'result':
                      print(item.get('result', ''))
                      sys.exit(0)
          except json.JSONDecodeError:
              pass
          # Try JSONL
          for line in content.splitlines():
              line = line.strip()
              if not line:
                  continue
              try:
                  d = json.loads(line)
                  if isinstance(d, dict) and d.get('type') == 'result':
                      print(d.get('result', ''))
                      sys.exit(0)
              except Exception:
                  pass
          print('ERROR: No result entry found in log file', file=sys.stderr)
          print(f'Log file size: {len(content)} bytes', file=sys.stderr)
          sys.exit(1)
          PYEOF
          )
          {
            echo "review_result<<CAPTURE_EOF"
            echo "$RESULT"
            echo "CAPTURE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate Spec Fix Suggestion Files
        id: gen-spec-fix
        if: steps.capture-review.outcome == 'success'
        env:
          SPEC_REVIEW_RESULT: ${{ steps.capture-review.outputs.review_result }}
          CHANGED_SPEC_FILES: ${{ steps.detect-spec-files.outputs.changed_spec_files }}
        run: |
          if [ -z "$SPEC_REVIEW_RESULT" ]; then
            echo "❌ Empty Spec review result, aborting workflow!"
            exit 1
          fi

          for FILE in $CHANGED_SPEC_FILES; do
            case "$FILE" in
              *.md) FIX_FILE="${FILE%.md}.fix.md" ;;
              *.yaml|*.yml) FIX_FILE="${FILE%.*}.fix.yml" ;;
              *.json) FIX_FILE="${FILE%.json}.fix.json" ;;
              *) FIX_FILE="$FILE.fix" ;;
            esac

            echo "# Spec Fix Suggestion: $FILE" > "$FIX_FILE"
            echo "## Generated at: $(date)" >> "$FIX_FILE"
            echo "## Review Result for $FILE" >> "$FIX_FILE"
            echo -e "\n$SPEC_REVIEW_RESULT" >> "$FIX_FILE"

            echo "✅ Fix suggestion file created: $FIX_FILE"
          done

          FIX_FILES=$(ls specs/active/*.fix.* 2>/dev/null | tr '\n' ',' | sed 's/,$//')
          echo "spec_fix_files=$FIX_FILES" >> "$GITHUB_OUTPUT"

      - name: Step 2 - Generate Code from Spec
        id: gen-code
        if: steps.capture-review.outcome == 'success'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          path_to_claude_code_executable: ${{ steps.install-claude.outputs.claude_path }}
          prompt: |
            ### CHANGED SPEC FILES
            ${{ steps.detect-spec-files.outputs.spec_files_list }}

            ### COMBINED SPEC CONTENT
            ${{ steps.detect-spec-files.outputs.spec_content }}

            ### TASK: Generate Code from Spec (SDD)
            Use the Write tool to write production-ready code files DIRECTLY TO DISK under ${{ env.CODE_GEN_DIR }}.

            Steps:
            1. Use Read + Bash(ls) to inspect existing code in apps/flomo/app/ (understand language, style, patterns)
            2. For each component defined in the spec, use the Write tool to save it with the full path (e.g. apps/flomo/app/feature.ts)
            3. Follow the spec's interface/parameter/return value rules strictly — no deviations
            4. Do NOT output markdown code blocks — write files directly with the Write tool
            5. Only generate what the spec explicitly defines

            After writing all files, output a plain-text summary:
            WRITTEN: apps/flomo/app/file1.ts
            WRITTEN: apps/flomo/app/file2.ts
          claude_args: "--allowedTools 'Write,Read,Bash(mkdir:*),Bash(ls:*)' --model claude-sonnet-4-5-20250929"

      - name: Capture code generation result from log
        id: capture-gen-code
        if: steps.gen-code.outcome == 'success'
        run: |
          RESULT=$(python3 - << 'PYEOF'
          import json, sys, os
          log_path = os.path.join(os.environ.get('RUNNER_TEMP', ''), 'claude-execution-output.json')
          try:
              content = open(log_path).read()
          except Exception as e:
              print(f'ERROR: Cannot open log file {log_path}: {e}', file=sys.stderr)
              sys.exit(1)
          try:
              data = json.loads(content)
              items = data if isinstance(data, list) else [data]
              for item in items:
                  if isinstance(item, dict) and item.get('type') == 'result':
                      print(item.get('result', ''))
                      sys.exit(0)
          except json.JSONDecodeError:
              pass
          for line in content.splitlines():
              line = line.strip()
              if not line:
                  continue
              try:
                  d = json.loads(line)
                  if isinstance(d, dict) and d.get('type') == 'result':
                      print(d.get('result', ''))
                      sys.exit(0)
              except Exception:
                  pass
          print('ERROR: No result entry found in log file', file=sys.stderr)
          sys.exit(1)
          PYEOF
          )
          {
            echo "gen_code_result<<CAPTURE_EOF"
            echo "$RESULT"
            echo "CAPTURE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Step 3 - Generate Test Cases from Spec
        id: gen-test
        if: steps.capture-gen-code.outcome == 'success'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          path_to_claude_code_executable: ${{ steps.install-claude.outputs.claude_path }}
          prompt: |
            ### CHANGED SPEC FILES
            ${{ steps.detect-spec-files.outputs.spec_files_list }}

            ### COMBINED SPEC CONTENT
            ${{ steps.detect-spec-files.outputs.spec_content }}

            ### GENERATED CODE FILES
            ${{ steps.capture-gen-code.outputs.gen_code_result }}

            ### TASK: Generate Test Cases from Spec (SDD)
            Use the Write tool to write comprehensive unit test files DIRECTLY TO DISK under ${{ env.TEST_GEN_DIR }}.

            Steps:
            1. Use Read + Bash(ls) to inspect existing tests in apps/flomo/tests/ (understand test framework, patterns)
            2. Read the generated code files listed above to understand what you are testing
            3. For each spec-defined component, use Write to save the test file (e.g. apps/flomo/tests/feature.test.ts)
            4. Cover positive, negative, and edge cases for every function/rule in the spec
            5. Do NOT output markdown code blocks — write files directly with the Write tool
            6. Ensure tests are runnable: correct imports, valid syntax, no missing dependencies

            After writing all test files, output a plain-text summary:
            WRITTEN: apps/flomo/tests/file1.test.ts
            WRITTEN: apps/flomo/tests/file2.test.ts
          claude_args: "--allowedTools 'Write,Read,Bash(mkdir:*),Bash(ls:*)' --model claude-sonnet-4-5-20250929"

      - name: Capture test generation result from log
        id: capture-gen-test
        if: steps.gen-test.outcome == 'success'
        run: |
          RESULT=$(python3 - << 'PYEOF'
          import json, sys, os
          log_path = os.path.join(os.environ.get('RUNNER_TEMP', ''), 'claude-execution-output.json')
          try:
              content = open(log_path).read()
          except Exception as e:
              print(f'ERROR: Cannot open log file {log_path}: {e}', file=sys.stderr)
              sys.exit(1)
          try:
              data = json.loads(content)
              items = data if isinstance(data, list) else [data]
              for item in items:
                  if isinstance(item, dict) and item.get('type') == 'result':
                      print(item.get('result', ''))
                      sys.exit(0)
          except json.JSONDecodeError:
              pass
          for line in content.splitlines():
              line = line.strip()
              if not line:
                  continue
              try:
                  d = json.loads(line)
                  if isinstance(d, dict) and d.get('type') == 'result':
                      print(d.get('result', ''))
                      sys.exit(0)
              except Exception:
                  pass
          print('ERROR: No result entry found in log file', file=sys.stderr)
          sys.exit(1)
          PYEOF
          )
          {
            echo "gen_test_result<<CAPTURE_EOF"
            echo "$RESULT"
            echo "CAPTURE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Verify Generated Files
        id: write-files
        if: steps.capture-gen-test.outcome == 'success'
        env:
          CODE_GEN_DIR: ${{ env.CODE_GEN_DIR }}
          TEST_GEN_DIR: ${{ env.TEST_GEN_DIR }}
        run: |
          # Claude already wrote files directly using the Write tool during the action steps.
          # Use git status to find what was newly added or modified.
          NEW_CODE=$(git status --porcelain "$CODE_GEN_DIR" 2>/dev/null | awk '{print $NF}')
          NEW_TEST=$(git status --porcelain "$TEST_GEN_DIR" 2>/dev/null | awk '{print $NF}')

          CODE_FILE_COUNT=$(printf '%s\n' $NEW_CODE | grep -v '^$' | wc -l | tr -d ' ')
          TEST_FILE_COUNT=$(printf '%s\n' $NEW_TEST | grep -v '^$' | wc -l | tr -d ' ')

          if [ "$CODE_FILE_COUNT" -eq 0 ]; then
            echo "❌ No new code files detected in $CODE_GEN_DIR"
            exit 1
          fi

          if [ "$TEST_FILE_COUNT" -eq 0 ]; then
            echo "❌ No new test files detected in $TEST_GEN_DIR"
            exit 1
          fi

          echo "✅ $CODE_FILE_COUNT new/modified code files in $CODE_GEN_DIR"
          echo "✅ $TEST_FILE_COUNT new/modified test files in $TEST_GEN_DIR"
          echo "code_files=$(printf '%s\n' $NEW_CODE | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"
          echo "test_files=$(printf '%s\n' $NEW_TEST | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"
          echo "code_file_count=$CODE_FILE_COUNT" >> "$GITHUB_OUTPUT"
          echo "test_file_count=$TEST_FILE_COUNT" >> "$GITHUB_OUTPUT"

      - name: Commit Generated Files
        if: steps.write-files.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODE_GEN_DIR: ${{ env.CODE_GEN_DIR }}
          TEST_GEN_DIR: ${{ env.TEST_GEN_DIR }}
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # 带 token 的 remote URL，解决 HTTPS 鉴权失败
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          git add "$CODE_GEN_DIR" "$TEST_GEN_DIR"
          git add specs/active/*.fix.* 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "ℹ️ No generated files to commit, skipping."
          else
            git commit -m "SDD: auto-generate code/tests from spec (${{ github.sha }})"
            git push origin "HEAD:${{ github.ref_name }}"
            echo "✅ Generated files committed to ${{ github.ref_name }}"
          fi

      - name: Publish All SDD Results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPEC_REVIEW_RESULT: ${{ steps.capture-review.outputs.review_result }}
          SPEC_FIX_FILES: ${{ steps.gen-spec-fix.outputs.spec_fix_files || 'None' }}
          CODE_GEN_SUMMARY: "Generated files: ${{ steps.write-files.outputs.code_files }} (Total: ${{ steps.write-files.outputs.code_file_count }})"
          TEST_GEN_SUMMARY: "Generated test files: ${{ steps.write-files.outputs.test_files }} (Total: ${{ steps.write-files.outputs.test_file_count }})"
          PR_NUMBER: ${{ github.event.pull_request.number || 'none' }}
          COMMIT_SHA: ${{ github.sha }}
          SPEC_FILES_LIST: ${{ steps.detect-spec-files.outputs.spec_files_list }}
        run: |
          SPEC_REVIEW_RESULT=${SPEC_REVIEW_RESULT:-"⚠️ No Spec review result returned."}

          FINAL_RESULT="## 📋 SDD Full Lifecycle Result
          - Commit SHA: $COMMIT_SHA
          - Changed Spec Files: $SPEC_FILES_LIST
          - Spec Fix Files: $SPEC_FIX_FILES
          - Code Gen Directory: ${{ env.CODE_GEN_DIR }}
          - Test Gen Directory: ${{ env.TEST_GEN_DIR }}

          ### 1. Spec Rationality Review
          $SPEC_REVIEW_RESULT

          ### 2. Code Generation Summary
          $CODE_GEN_SUMMARY

          ### 3. Test Case Generation Summary
          $TEST_GEN_SUMMARY

          > Notes:
          > - Generated files are committed to the repository (Push event only).
          > - Spec fix suggestions are saved to specs/active/*.fix.* files (original spec files are NOT modified).
          > - Workflow aborts immediately on any step failure (strict mode)."

          if [ "$PR_NUMBER" != "none" ]; then
            gh pr comment "$PR_NUMBER" --body "$FINAL_RESULT"
            echo "✅ SDD results published to PR #$PR_NUMBER comments"
          else
            gh issue create \
              --title "SDD Full Lifecycle: $COMMIT_SHA (Spec: $SPEC_FILES_LIST)" \
              --body "$FINAL_RESULT" \
              --label "sdd-full-lifecycle,claude-official,auto-gen,strict-mode"
            echo "✅ SDD results published to new Issue"
          fi

  quality:
    needs: [detect, sdd]
    if: >-
      ${{ always()
          && needs.detect.result == 'success'
          && (needs.sdd.result == 'success' || needs.sdd.result == 'skipped')
          && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_quality == '1') }}
    runs-on: [self-hosted, ai-runner]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/flomo/package-lock.json

      - name: Install dependencies
        working-directory: apps/flomo
        run: npm install

      - name: Prisma generate
        working-directory: apps/flomo
        run: npm run db:generate

      - name: npm audit (critical only)
        working-directory: apps/flomo
        run: npm audit --audit-level=critical

      - name: Build
        working-directory: apps/flomo
        run: npm run build

      - name: Test (coverage gate)
        working-directory: apps/flomo
        run: npm run test:coverage

  release-pr:
    needs: quality
    if: >-
      ${{ github.event_name == 'workflow_dispatch'
          && needs.quality.result == 'success'
          && github.event.inputs.run_release_pr == '1' }}
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI (gh)
        run: |
          if command -v gh &> /dev/null; then
            exit 0
          fi

          if [ "${{ runner.os }}" = "Linux" ]; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo apt update && sudo apt install -y gh
            exit 0
          fi

          if [ "${{ runner.os }}" = "macOS" ]; then
            brew install gh
            exit 0
          fi

          echo "Unsupported runner OS for gh install: ${{ runner.os }}"
          exit 1

      - name: Create PR if missing
        env:
          BASE: main-new
          HEAD: feat/lss
        run: |
          EXISTING=$(gh pr list --head "$HEAD" --base "$BASE" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR already exists: #$EXISTING"
            exit 0
          fi

          gh pr create \
            --base "$BASE" \
            --head "$HEAD" \
            --title "${HEAD} -> ${BASE}" \
            --body "Auto-created release PR from ${HEAD}."
