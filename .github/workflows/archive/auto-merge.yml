name: Auto Merge PR (Squash)

on:
  pull_request:
    branches: [feat/lss]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to enable auto-merge'
        required: true

jobs:
  enable-auto-merge:
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Enable auto-merge
        if: github.event_name == 'workflow_dispatch'
        run: |
          gh pr merge "${{ github.event.inputs.pr_number }}" --squash --auto

      - name: Enable auto-merge (PR event)
        if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" --squash --auto
