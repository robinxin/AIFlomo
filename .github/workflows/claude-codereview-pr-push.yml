name: Claude Codereview

on:
  pull_request:
    branches: [main, workflow-jl]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, workflow-jl]

jobs:
  # PR 事件：使用 claude-code-action（原生支持 PR 评论）
  claude-codereview-pr:
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: read
      pull-requests: write
    env:
      PR_PROMPT: |
        REPO: ${{ github.repository }}
        PR NUMBER: ${{ github.event.pull_request.number }}

        Please review this pull request with a focus on:
        - Code quality and best practices
        - Potential bugs or issues
        - Security implications
        - Performance considerations
        Provide detailed feedback using inline comments for specific issues.
        Note: The PR branch is already checked out in the current working directory.

        Use `gh pr comment` for top-level feedback.
        Use `mcp__github_inline_comment__create_inline_comment` to highlight specific code issues.
        Only post GitHub comments - don't submit review text as messages.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          anthropic-api-base-url: "https://claude.hatch.yinxiang.com/api"
          model: claude-sonnet-4-5-20250929
          track_progress: true
          prompt: ${{ env.PR_PROMPT }}
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"'

  # Push 事件：使用 Claude CLI（action 不支持 push）
  claude-codereview-push:
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: read
      issues: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: "https://claude.hatch.yinxiang.com/api"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Review push commit
        id: review
        run: |
          DIFF=$(git diff HEAD^ HEAD || true)

          cat > /tmp/review-prompt.txt <<PROMPT_EOF
          REPO: ${{ github.repository }}
          PUSHER: ${{ github.actor }}
          COMMIT SHA: ${{ github.sha }}
          PUSH BRANCH: ${{ github.ref_name }}

          Please review this push commit diff with a focus on:
          - Completeness and correctness of submitted code
          - Whether new syntax errors or runtime issues are introduced
          - Whether temporary debugging code or sensitive information is included
          - Whether the code submission granularity is reasonable

          --- DIFF ---
          $DIFF
          PROMPT_EOF

          RESULT=$(claude --print --model claude-sonnet-4-5-20250929 < /tmp/review-prompt.txt)

          echo "review_result<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create Review Issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVIEW_RESULT: ${{ steps.review.outputs.review_result }}
        run: |
          if [ -z "$REVIEW_RESULT" ]; then
            REVIEW_RESULT="No review result returned from Claude. Please check workflow logs."
          fi
          gh issue create \
            --title "Code Review: Push to ${{ github.ref_name }} (${{ github.sha }})" \
            --body "$REVIEW_RESULT" \
            --label "code-review,push-event"
