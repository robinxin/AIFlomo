name: Claude Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: ['feat/**']
    paths:
      - 'apps/**'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  code-review:
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      ANTHROPIC_BASE_URL: 'http://127.0.0.1:18080'
      UPSTREAM_API_URL:   'https://claude.hatch.yinxiang.com/api'
      MODEL:              'claude-sonnet-4-5-20250929'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 启动代理，剥离 context_management（与 sdd-pipeline 保持一致）
      - name: Start proxy (strip context_management)
        env:
          UPSTREAM_API_URL: ${{ env.UPSTREAM_API_URL }}
        run: |
          cat > /tmp/strip-proxy.js << 'EOF'
          const http = require('http'), https = require('https');
          const up = new URL(process.env.UPSTREAM_API_URL);
          http.createServer((req, res) => {
            let body = '';
            req.on('data', c => body += c);
            req.on('end', () => {
              try { const d = JSON.parse(body); delete d.context_management; body = JSON.stringify(d); } catch(e) {}
              const opts = {
                hostname: up.hostname, port: 443,
                path: up.pathname + (req.url === '/' ? '' : req.url),
                method: req.method,
                headers: { ...req.headers, host: up.hostname, 'content-length': Buffer.byteLength(body) }
              };
              const r = https.request(opts, pr => { res.writeHead(pr.statusCode, pr.headers); pr.pipe(res); });
              r.on('error', e => { res.writeHead(502); res.end(e.message); });
              r.write(body); r.end();
            });
          }).listen(18080, '127.0.0.1', () => console.log('Proxy ready on :18080'));
          EOF
          node /tmp/strip-proxy.js &
          sleep 2

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.50

      - name: Load Constitution
        run: |
          {
            echo "CONSTITUTION<<CONSTITUTION_EOF"
            cat CONSTITUTION.md 2>/dev/null || echo "# No constitution file found"
            echo "CONSTITUTION_EOF"
          } >> "$GITHUB_ENV"

      # 获取 diff（PR 场景）
      - name: Get diff for PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/review.diff
          echo "REVIEW_CONTEXT=PR #${{ github.event.pull_request.number }}: ${PR_TITLE}" >> "$GITHUB_ENV"

      # 获取 diff（Push 场景）
      - name: Get diff for Push
        if: github.event_name == 'push'
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          BEFORE="${{ github.event.before }}"
          SHA="${{ github.sha }}"
          # before 全为 0 表示新建分支，只展示最新一次提交
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || \
             ! git cat-file -e "$BEFORE" 2>/dev/null; then
            git show "$SHA" > /tmp/review.diff
          else
            git diff "$BEFORE" "$SHA" > /tmp/review.diff
          fi
          MSG=$(printf '%s' "$COMMIT_MSG" | head -1)
          echo "REVIEW_CONTEXT=Push to ${{ github.ref_name }} by ${{ github.actor }} — ${MSG}" >> "$GITHUB_ENV"

      # 调用 Claude 执行代码审查
      - name: Run Claude Code Review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DIFF=$(cat /tmp/review.diff)

          RESULT=$(claude --print \
            --allowedTools "Read,Bash(ls:*)" \
            --model "$MODEL" \
            "$(cat << PROMPT
          ## PROJECT CONSTITUTION (MUST FOLLOW — HIGHEST PRIORITY)
          ${CONSTITUTION}

          ---

          You are an experienced code reviewer. Review the following code diff.
          Context: ${REVIEW_CONTEXT}

          Analyze the diff from these angles:
          1. **Code Quality** — naming, structure, readability, best practices
          2. **Bugs & Logic** — off-by-one, null dereference, incorrect conditions
          3. **Security** — injection, XSS, sensitive data exposure, input validation
          4. **Performance** — unnecessary computation, N+1 queries, memory leaks
          5. **Conventions** — follows project style (TypeScript, Next.js App Router, Prisma, no any/ts-ignore)

          DIFF:
          ${DIFF}

          Format your response as:
          ## Summary
          One-line verdict: ✅ LGTM / ⚠️ Needs Changes / 🚨 Critical Issues

          ## Issues
          For each issue: [CRITICAL/WARN/INFO] file:line — description and suggestion

          ## Highlights (optional)
          Any notably good practices worth calling out.
          PROMPT
          )")

          echo "$RESULT"
          echo "$RESULT" > /tmp/review-result.txt

          {
            echo "result<<RESULT_EOF"
            echo "$RESULT"
            echo "RESULT_EOF"
          } >> "$GITHUB_OUTPUT"

      # PR 场景：把审查结果作为评论发到 PR
      - name: Post review comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="$(cat /tmp/review-result.txt)"
          cat > /tmp/pr-comment.md << 'COMMENT_HEADER'
          ## Claude Code Review
          COMMENT_HEADER
          echo "" >> /tmp/pr-comment.md
          echo "$BODY" >> /tmp/pr-comment.md
          printf '\n---\n*Generated by Claude `%s` · [Workflow run](%s/%s/actions/runs/%s)*\n' \
            "${MODEL}" "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}" \
            >> /tmp/pr-comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/pr-comment.md

      # Push 场景：把审查结果创建为 GitHub Issue
      - name: Create review issue for Push
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          BODY="$(cat /tmp/review-result.txt)"
          if [ -z "$BODY" ]; then
            BODY="No review result returned from Claude. Check workflow logs for details."
          fi
          {
            printf '### Code Review for Push Commit\n\n'
            printf '**Branch**: `%s`\n' "${{ github.ref_name }}"
            printf '**Commit**: `%s`\n' "${{ github.sha }}"
            printf '**Author**: %s\n' "${{ github.actor }}"
            printf '**Message**: %s\n' "$COMMIT_MSG"
            printf '**Workflow**: %s/%s/actions/runs/%s\n' \
              "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}"
            printf '\n---\n\n'
          } > /tmp/issue-body.md
          echo "$BODY" >> /tmp/issue-body.md
          gh issue create \
            --title "Code Review: Push to ${{ github.ref_name }} (${GITHUB_SHA::7})" \
            --body-file /tmp/issue-body.md
