name: Issue to Feature (ai-feature label)

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      extra_prompt:
        description: '额外指令（追加到 AI prompt 末尾）'
        default: ''
        required: false

jobs:
  generate-spec:
    if: github.event.label.name == 'ai-feature'
    runs-on: [self-hosted, ai-runner]
    outputs:
      branch: ${{ steps.branch.outputs.branch }}
      spec_file: ${{ steps.specgen.outputs.spec_file }}
      issue_number: ${{ steps.branch.outputs.issue_number }}
    permissions:
      contents: write
      issues: write
      actions: write
    env:
      ANTHROPIC_BASE_URL: 'http://127.0.0.1:18080'
      UPSTREAM_API_URL:   'https://claude.hatch.yinxiang.com/api'
      MODEL:              'claude-sonnet-4-5-20250929'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Comment — AI 已接单
        run: |
          printf '🤖 **AI 已接单**\n\n正在根据 Issue 内容生成 Spec 文档并创建开发分支，请稍候...\n\n[查看工作流进度](%s/%s/actions/runs/%s)\n' \
            "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}" \
            > /tmp/comment.md
          gh issue comment ${{ github.event.issue.number }} --body-file /tmp/comment.md

      - name: Start proxy (strip context_management)
        env:
          UPSTREAM_API_URL: ${{ env.UPSTREAM_API_URL }}
        run: |
          cat > /tmp/strip-proxy.js << 'EOF'
          const http = require('http'), https = require('https');
          const up = new URL(process.env.UPSTREAM_API_URL);
          http.createServer((req, res) => {
            let body = '';
            req.on('data', c => body += c);
            req.on('end', () => {
              try { const d = JSON.parse(body); delete d.context_management; body = JSON.stringify(d); } catch(e) {}
              const opts = {
                hostname: up.hostname, port: 443,
                path: up.pathname + (req.url === '/' ? '' : req.url),
                method: req.method,
                headers: { ...req.headers, host: up.hostname, 'content-length': Buffer.byteLength(body) }
              };
              const r = https.request(opts, pr => { res.writeHead(pr.statusCode, pr.headers); pr.pipe(res); });
              r.on('error', e => { res.writeHead(502); res.end(e.message); });
              r.write(body); r.end();
            });
          }).listen(18080, '127.0.0.1', () => console.log('Proxy ready on :18080'));
          EOF
          node /tmp/strip-proxy.js &
          sleep 2

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.50

      - name: Load Constitution
        run: |
          {
            echo "CONSTITUTION<<CONSTITUTION_EOF"
            cat CONSTITUTION.md 2>/dev/null || echo "# No constitution file found"
            echo "CONSTITUTION_EOF"
          } >> "$GITHUB_ENV"

      - name: Generate slug and branch name
        id: branch
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"

          # 用 Claude 将标题翻译为英文 slug
          RAW_SLUG=$(claude --print --model "$MODEL" \
            "Translate the following title to a short English slug (lowercase, hyphens, no spaces, max 40 chars, no quotes, no explanation, just the slug): ${ISSUE_TITLE}" \
            2>/dev/null || echo "")

          # 清理 slug：只保留 a-z0-9 和连字符
          SLUG=$(printf '%s' "$RAW_SLUG" \
            | tr '[:upper:]' '[:lower:]' \
            | tr -cs 'a-z0-9' '-' \
            | sed 's/^-//; s/-$//' \
            | cut -c1-40 \
            | sed 's/-$//')

          # 兜底：如果 slug 仍为空，用纯本地逻辑
          if [ -z "$SLUG" ]; then
            SLUG=$(printf '%s' "$ISSUE_TITLE" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/\[feature\] //g; s/\[bug\] //g' \
              | tr -cs 'a-z0-9' '-' \
              | sed 's/^-//; s/-$//' \
              | cut -c1-40 \
              | sed 's/-$//')
          fi

          BRANCH="feat/${ISSUE_NUMBER}-${SLUG}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Branch will be: $BRANCH"

      - name: Generate Spec from Issue
        id: specgen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          EXTRA_PROMPT: ${{ github.event.inputs.extra_prompt }}
        run: |
          export ISSUE_NUMBER="${{ github.event.issue.number }}"
          export SPEC_FILE="specs/active/${{ steps.branch.outputs.issue_number }}-${{ steps.branch.outputs.slug }}.md"

          PROMPT_TEXT=$(python3 .github/scripts/envsubst.py < .github/prompts/spec-gen.md)

          claude --print \
            --allowedTools "Read,Write,Bash(ls:*)" \
            --model "$MODEL" \
            "$PROMPT_TEXT"

          echo "spec_file=$SPEC_FILE" >> "$GITHUB_OUTPUT"

      - name: Create branch and push spec
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"

          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          git checkout -b "$BRANCH"
          git add specs/active/

          if git diff --cached --quiet; then
            echo "⚠️ No spec file was generated."
            exit 1
          fi

          git commit -m "feat: generate spec for issue #${{ github.event.issue.number }}"
          git push origin "$BRANCH"
          echo "✅ Branch $BRANCH created and spec pushed."

      - name: Write Spec to Job Summary
        if: success()
        run: |
          SPEC_FILE="${{ steps.specgen.outputs.spec_file }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          SPEC_URL="${{ github.server_url }}/${{ github.repository }}/blob/${BRANCH}/${SPEC_FILE}"
          {
            echo "## Spec Preview"
            echo ""
            echo "> **Branch**: \`${BRANCH}\` | **File**: [\`${SPEC_FILE}\`](${SPEC_URL})"
            echo ""
            echo "---"
            echo ""
            cat "$SPEC_FILE"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment — Spec 已生成，等待审批
        if: success()
        env:
          SPEC_FILE: ${{ steps.specgen.outputs.spec_file }}
          BRANCH: ${{ steps.branch.outputs.branch }}
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          SPEC_URL="${SERVER_URL}/${REPO}/blob/${BRANCH}/${SPEC_FILE}"
          {
            printf '📋 **Spec 已生成，等待人工审批**\n\n'
            printf '- **分支**: `%s`\n' "$BRANCH"
            printf '- **Spec 文件**: [`%s`](%s)\n\n' "$SPEC_FILE" "$SPEC_URL"
            printf '审批入口：[GitHub Actions → Spec Approval](%s/%s/actions/runs/%s)\n\n' \
              "$SERVER_URL" "$REPO" "$RUN_ID"
            printf '<details>\n<summary>📖 点击展开 Spec 全文</summary>\n\n'
            cat "$SPEC_FILE"
            printf '\n</details>\n\n'
            printf '审批通过后将自动触发 SDD Pipeline。\n'
          } > /tmp/comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/comment.md

      - name: Comment — 失败通知
        if: failure()
        run: |
          printf '❌ **AI 处理失败**\n\nSpec 生成或分支创建过程中发生错误，请检查工作流日志。\n\n[查看错误详情](%s/%s/actions/runs/%s)\n' \
            "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}" \
            > /tmp/comment.md
          gh issue comment ${{ github.event.issue.number }} --body-file /tmp/comment.md

  # ─── Spec 审批 ───────────────────────────────────────────────────
  spec-approval:
    needs: generate-spec
    if: github.event.label.name == 'ai-feature'
    environment: spec-approval
    runs-on: [self-hosted, ai-runner]
    steps:
      - run: echo "✅ Spec approved — triggering SDD Pipeline"

  # ─── 触发 SDD Pipeline ──────────────────────────────────────────
  trigger-sdd:
    needs: [generate-spec, spec-approval]
    runs-on: [self-hosted, ai-runner]
    permissions:
      issues: write
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Trigger SDD Pipeline
        run: |
          BRANCH="${{ needs.generate-spec.outputs.branch }}"
          gh workflow run claude-SDD.yml --ref "$BRANCH"
          echo "✅ SDD Pipeline triggered on $BRANCH"

      - name: Comment — SDD 已触发
        run: |
          ISSUE_NUMBER="${{ needs.generate-spec.outputs.issue_number }}"
          BRANCH="${{ needs.generate-spec.outputs.branch }}"
          printf '🚀 **Spec 已通过审批，SDD Pipeline 已触发**\n\n- **分支**: `%s`\n\n[查看 SDD Pipeline 进度](%s/%s/actions)\n' \
            "$BRANCH" "${{ github.server_url }}" "${{ github.repository }}" \
            > /tmp/comment.md
          gh issue comment "$ISSUE_NUMBER" --body-file /tmp/comment.md
