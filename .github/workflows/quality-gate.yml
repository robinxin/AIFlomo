name: Quality Gate

on:
  # SDD codegen 完成后自动触发
  workflow_run:
    workflows: ["SDD Pipeline"]
    types: [completed]
  # feat/** / bugfix/** 分支推送时触发
  push:
    branches: ['feat/**', 'bugfix/**']
    paths:
      - 'apps/server/**'
      - 'apps/mobile/**'
      - 'apps/tests/**'
  # PR 到 main 时触发
  pull_request:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'apps/mobile/**'
      - 'apps/tests/**'
  workflow_dispatch:

jobs:
  # ─── Quality Gate ────────────────────────────────────────────────────────
  quality:
    if: >-
      ${{ github.event_name != 'workflow_run'
          || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, ai-runner]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: |
          npm run lint -w apps/server
          npm run lint -w apps/mobile

      - name: Build
        run: |
          npm run build -w apps/server
          npm run build -w apps/mobile

      - name: Run SDD-generated test cases
        run: |
          TEST_COUNT=$(find apps/tests/ -name "*.spec.js" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$TEST_COUNT" -gt 0 ]; then
            echo "🧪 Found $TEST_COUNT SDD-generated test file(s) — running..."
            npm run test
            echo "✅ SDD test cases passed"
          else
            echo "ℹ️ No SDD-generated test files in apps/tests/ — skipping"
          fi
