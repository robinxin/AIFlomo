name: Quality Gate

on:
  # SDD Pipeline 完成后通过 workflow_dispatch 主动触发（见 claude-SDD.yml trigger-quality-gate job）
  workflow_dispatch:
    inputs:
      fix_attempt:
        description: 'Auto-fix 已执行次数（由流水线自动管理）'
        default: '0'
        required: false
  # PR 到 main 时触发
  pull_request:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'apps/mobile/**'
      - 'apps/tests/**'

jobs:
  # ─── Quality Gate ────────────────────────────────────────────────────────
  quality:
    runs-on: [self-hosted, ai-runner]
    outputs:
      error_summary: ${{ steps.collect-errors.outputs.error_summary }}
      test_errors: ${{ steps.collect-errors.outputs.test_errors }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      
      # 新增清理步骤，彻底清除上一次运行留下的 node_modules 和临时文件
      - name: Clean workspace
        run: git clean -ffdx

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bash scripts/ci/install.sh

      - name: Lint
        id: lint
        run: |
          bash scripts/ci/lint.sh 2>&1 | tee /tmp/lint-output.txt
          exit ${PIPESTATUS[0]}

      - name: Build
        id: build
        run: |
          bash scripts/ci/build.sh 2>&1 | tee /tmp/build-output.txt
          exit ${PIPESTATUS[0]}

      - name: Run database migrations
        id: db-migrate
        run: |
          bash scripts/ci/db-reset.sh 2>&1 | tee /tmp/db-reset-output.txt
          [ ${PIPESTATUS[0]} -eq 0 ] || exit 1

          bash scripts/ci/db-setup.sh 2>&1 | tee /tmp/db-setup-output.txt
          [ ${PIPESTATUS[0]} -eq 0 ] || exit 1

          bash scripts/ci/db-migrate.sh 2>&1 | tee /tmp/db-migrate-output.txt
          exit ${PIPESTATUS[0]}

      - name: Start services for testing
        id: start-services
        run: |
          # 后端：dev server
          bash scripts/ci/server-start.sh > /tmp/server-output.txt 2>&1 &
          echo $! > /tmp/server.pid

          # 前端：serve 预编译静态产物（build 步骤已生成 apps/mobile/dist/）
          # 使用静态托管而非 Metro dev server，避免 JS bundle 懒编译导致测试时页面未就绪
          bash scripts/ci/frontend-serve.sh > /tmp/frontend-output.txt 2>&1 &
          echo $! > /tmp/frontend.pid

          echo "Services starting..."

          # 1. 等后端 /health 就绪（含 DB 可用性验证）
          SERVER_URL=$(bash scripts/ci/server-url.sh)
          for i in $(seq 1 30); do
            if curl -sf "$SERVER_URL/health" > /dev/null 2>&1; then
              echo "✅ Backend ready at $SERVER_URL"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Backend did not respond within 60s"
              cat /tmp/server-output.txt
              exit 1
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

          # 2. 等前端静态服务就绪（200 即代表 JS bundle 已可访问，无需额外等待编译）
          FRONTEND_URL=$(bash scripts/ci/frontend-url.sh)
          for i in $(seq 1 30); do
            if curl -sf "$FRONTEND_URL" > /dev/null 2>&1; then
              echo "✅ Frontend ready at $FRONTEND_URL"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Frontend did not respond within 60s"
              cat /tmp/frontend-output.txt
              exit 1
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done
          sed -i.bak 's|url: "${WEB_URL}"|url: "'"$FRONTEND_URL"'"|g' apps/tests/*.yaml && rm -f apps/tests/*.bak

      - name: Run SDD-generated test cases
        id: test
        run: |
          echo "Waiting 10s for frontend to fully initialize..."
          sleep 10
          
          bash scripts/ci/test.sh 2>&1 | tee /tmp/test-output.txt
          exit ${PIPESTATUS[0]}

      - name: Stop services
        if: always()
        run: |
          for PIDFILE in /tmp/server.pid /tmp/frontend.pid; do
            if [ -f "$PIDFILE" ]; then
              PID=$(cat "$PIDFILE")
              kill -- "-$PID" 2>/dev/null || kill "$PID" 2>/dev/null || true
              echo "Stopped PID $PID ($PIDFILE)"
            fi
          done

      - name: Collect errors
        id: collect-errors
        if: always()
        run: |
          LINT_OUTCOME="${{ steps.lint.outcome }}"
          BUILD_OUTCOME="${{ steps.build.outcome }}"
          DB_MIGRATE_OUTCOME="${{ steps.db-migrate.outcome }}"
          TEST_OUTCOME="${{ steps.test.outcome }}"

          # 使用随机 delimiter 避免错误内容与定界符冲突（原 ERROR_EOF 为硬编码，存在截断风险）
          DELIM="ERROR_$(openssl rand -hex 8)"
          {
            echo "error_summary<<${DELIM}"
            [ "$LINT_OUTCOME"       = "failure" ] && echo "=== Lint Errors ===" && tail -100 /tmp/lint-output.txt
            [ "$BUILD_OUTCOME"      = "failure" ] && echo "=== Build Errors ===" && tail -100 /tmp/build-output.txt
            [ "$DB_MIGRATE_OUTCOME" = "failure" ] && echo "=== DB Migration Errors ===" && cat /tmp/db-migrate-output.txt
            [ "$TEST_OUTCOME"       = "failure" ] && echo "=== Test Errors ===" && tail -200 /tmp/test-output.txt
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

          # 单独输出完整 test_errors，随机 delimiter 避免内容冲突
          DELIM2="TEST_ERRORS_$(openssl rand -hex 8)"
          {
            echo "test_errors<<${DELIM2}"
            [ "$TEST_OUTCOME" = "failure" ] && [ -s /tmp/test-output.txt ] && cat /tmp/test-output.txt || true
            echo "${DELIM2}"
          } >> "$GITHUB_OUTPUT"

  # ─── Quality 通过 → 触发 Code Review ────────────────────────────
  trigger-code-review:
    needs: quality
    # 只在 quality job 真正通过时触发，不依赖 workflow_run.conclusion（该值受 continue-on-error 影响不可靠）
    if: success() && github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, ai-runner]
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Dispatch code-review
        run: |
          gh workflow run code-review.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}"
          echo "✅ Code Review triggered on ${{ github.ref_name }}"

  # ─── Quality 失败 → 自动触发 autofix workflow ────────────────────
  auto-fix:
    needs: quality
    if: failure() && github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, ai-runner]
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MAX_FIX_ROUNDS: 5
    steps:
      - name: Trigger autofix workflow
        # 多行内容必须通过 env: 传入，不能用 ${{ }} 内联展开进 bash 脚本
        # 否则 error_summary 里的单引号/换行会破坏 heredoc / shell 解析
        env:
          ERROR_SUMMARY: ${{ needs.quality.outputs.error_summary }}
          TEST_ERRORS: ${{ needs.quality.outputs.test_errors }}
        run: |
          FIX_ATTEMPT="${{ github.event.inputs.fix_attempt || '0' }}"

          if [ "$FIX_ATTEMPT" -ge "$MAX_FIX_ROUNDS" ]; then
            echo "⚠️ Auto-fix 已达上限（$FIX_ATTEMPT/$MAX_FIX_ROUNDS 次），停止自动修复，请人工介入。"
            BRANCH="${{ github.ref_name }}"
            ISSUE_NUMBER=$(echo "$BRANCH" | sed 's|.*\/\([0-9]*\)-.*|\1|')
            if [ -n "$ISSUE_NUMBER" ] && [ "$ISSUE_NUMBER" != "$BRANCH" ]; then
              gh issue comment "$ISSUE_NUMBER" \
                --body "❌ **Auto-fix 已达到上限（${MAX_FIX_ROUNDS} 次），Quality Gate 仍未通过，请人工介入修复后重新触发流水线。**" \
                --repo "${{ github.repository }}"
            fi
            exit 0
          fi

          NEXT_ATTEMPT=$(( FIX_ATTEMPT + 1 ))
          echo "🔄 Autofix 第 $NEXT_ATTEMPT/$MAX_FIX_ROUNDS 次，branch: ${{ github.ref_name }}"

          # 写到临时文件，用 jq --rawfile 构建 JSON，避免任何引号/换行转义问题
          printf '%s' "$ERROR_SUMMARY" > /tmp/dispatch-errors.txt
          printf '%s' "$TEST_ERRORS"   > /tmp/dispatch-test-errors.txt

          jq -n \
            --arg ref "${{ github.ref_name }}" \
            --arg branch "${{ github.ref_name }}" \
            --rawfile quality_errors /tmp/dispatch-errors.txt \
            --rawfile test_errors /tmp/dispatch-test-errors.txt \
            --arg fix_attempt "$NEXT_ATTEMPT" \
            '{ref: $ref, inputs: {branch: $branch, quality_errors: $quality_errors, test_errors: $test_errors, extra_feedback: "", fix_attempt: $fix_attempt}}' \
          | gh api "repos/${{ github.repository }}/actions/workflows/autofix.yml/dispatches" \
              -X POST --input -

          echo "✅ Autofix workflow triggered（attempt $NEXT_ATTEMPT）on ${{ github.ref_name }}"
