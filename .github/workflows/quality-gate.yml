name: Quality Gate

on:
  # SDD Pipeline 完成后通过 workflow_dispatch 主动触发（见 claude-SDD.yml trigger-quality-gate job）
  workflow_dispatch:
    inputs:
      fix_attempt:
        description: 'Auto-fix 已执行次数（由流水线自动管理）'
        default: '0'
        required: false
  # PR 到 main 时触发
  pull_request:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'apps/mobile/**'
      - 'apps/tests/**'

jobs:
  # ─── Quality Gate ────────────────────────────────────────────────────────
  quality:
    runs-on: [self-hosted, ai-runner]
    outputs:
      error_summary: ${{ steps.collect-errors.outputs.error_summary }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ ! -f "package.json" ]; then
            echo "❌ No package.json found — SDD codegen has not generated project files yet."
            exit 1
          fi
          npm install

      - name: Lint
        id: lint
        run: |
          npm run lint 2>&1 | tee /tmp/lint-output.txt
          exit ${PIPESTATUS[0]}

      - name: Build
        id: build
        run: |
          npm run build 2>&1 | tee /tmp/build-output.txt
          exit ${PIPESTATUS[0]}

      - name: Start services for testing
        run: |
          npm run dev > /tmp/server-output.txt 2>&1 &
          echo $! > /tmp/server.pid
          echo "Services starting (PID: $(cat /tmp/server.pid))..."
          # Parse actual frontend URL from Expo output (e.g. "Web is waiting on http://localhost:8081")
          FRONTEND_URL=""
          for i in $(seq 1 30); do
            FRONTEND_URL=$(grep -oP 'http://localhost:\d+' /tmp/server-output.txt | head -1)
            if [ -n "$FRONTEND_URL" ]; then
              echo "✅ Frontend detected at $FRONTEND_URL"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Could not detect frontend URL within 60s"
              cat /tmp/server-output.txt
              exit 1
            fi
            echo "Waiting for frontend URL... ($i/30)"
            sleep 2
          done
          sed -i "s|^WEB_URL=.*|WEB_URL=$FRONTEND_URL|" test.env

      - name: Run SDD-generated test cases
        id: test
        run: |
          if find apps/tests/ -name "*.yaml" -quit 2>/dev/null | grep -q .; then
            echo "Running test cases..."
            npm run test 2>&1 | tee /tmp/test-output.txt
            exit ${PIPESTATUS[0]}
          else
            echo "ℹ️ No test files in apps/tests/ — skipping"
          fi

      - name: Stop services
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            PID=$(cat /tmp/server.pid)
            # Kill the process group to also stop forked child processes
            kill -- "-$PID" 2>/dev/null || kill "$PID" 2>/dev/null || true
            echo "Services stopped (PID: $PID)"
          fi

      - name: Collect errors
        id: collect-errors
        if: always()
        run: |
          {
            echo "error_summary<<ERROR_EOF"
            [ -s /tmp/lint-output.txt ]  && echo "=== Lint Errors ===" && tail -100 /tmp/lint-output.txt
            [ -s /tmp/build-output.txt ] && echo "=== Build Errors ===" && tail -100 /tmp/build-output.txt
            [ -s /tmp/test-output.txt ]  && echo "=== Test Errors ===" && tail -50 /tmp/test-output.txt
            echo "ERROR_EOF"
          } >> "$GITHUB_OUTPUT"

  # ─── Quality 失败 → 自动触发 autofix workflow ────────────────────
  auto-fix:
    needs: quality
    if: failure() && github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, ai-runner]
    # 不影响整体 workflow conclusion，确保 code-review.yml 的 workflow_run 能正确感知
    continue-on-error: true
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MAX_FIX_ROUNDS: 5
    steps:
      - name: Trigger autofix workflow
        run: |
          FIX_ATTEMPT="${{ github.event.inputs.fix_attempt || '0' }}"

          if [ "$FIX_ATTEMPT" -ge "$MAX_FIX_ROUNDS" ]; then
            echo "⚠️ Auto-fix 已达上限（$FIX_ATTEMPT/$MAX_FIX_ROUNDS 次），停止自动修复，请人工介入。"
            BRANCH="${{ github.ref_name }}"
            ISSUE_NUMBER=$(echo "$BRANCH" | sed 's|.*\/\([0-9]*\)-.*|\1|')
            if [ -n "$ISSUE_NUMBER" ] && [ "$ISSUE_NUMBER" != "$BRANCH" ]; then
              gh issue comment "$ISSUE_NUMBER" \
                --body "❌ **Auto-fix 已达到上限（${MAX_FIX_ROUNDS} 次），Quality Gate 仍未通过，请人工介入修复后重新触发流水线。**" \
                --repo "${{ github.repository }}"
            fi
            exit 0
          fi

          NEXT_ATTEMPT=$(( FIX_ATTEMPT + 1 ))
          echo "🔄 Autofix 第 $NEXT_ATTEMPT/$MAX_FIX_ROUNDS 次，branch: ${{ github.ref_name }}"

          ERROR_MSG=$(cat << 'ERRMSG'
          ${{ needs.quality.outputs.error_summary }}
          ERRMSG
          )

          gh api "repos/${{ github.repository }}/actions/workflows/autofix.yml/dispatches" \
            -X POST \
            --input - << EOF
          {
            "ref": "${{ github.ref_name }}",
            "inputs": {
              "branch": "${{ github.ref_name }}",
              "quality_errors": $(echo "$ERROR_MSG" | jq -Rs .),
              "extra_feedback": "",
              "fix_attempt": "$NEXT_ATTEMPT"
            }
          }
          EOF
          echo "✅ Autofix workflow triggered（attempt $NEXT_ATTEMPT）on ${{ github.ref_name }}"
