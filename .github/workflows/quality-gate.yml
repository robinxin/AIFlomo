name: Quality Gate

on:
  # SDD Pipeline 完成后通过 workflow_dispatch 主动触发（见 claude-SDD.yml trigger-quality-gate job）
  workflow_dispatch:
  # PR 到 main 时触发
  pull_request:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'apps/mobile/**'
      - 'apps/tests/**'

jobs:
  # ─── Quality Gate ────────────────────────────────────────────────────────
  quality:
    runs-on: [self-hosted, ai-runner]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ ! -f "package.json" ]; then
            echo "❌ No package.json found — SDD codegen has not generated project files yet."
            exit 1
          fi
          npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run SDD-generated test cases
        run: |
          TEST_COUNT=$(find apps/tests/ -name "*.yaml" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$TEST_COUNT" -gt 0 ]; then
            echo "🧪 Found $TEST_COUNT test file(s) — running..."
            npm run test
            echo "✅ Test cases passed"
          else
            echo "ℹ️ No test files in apps/tests/ — skipping"
          fi

  # ─── Quality 失败 → 自动触发 sdd-codegen fix 模式 ───────────────
  auto-fix:
    needs: quality
    if: failure() && github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, ai-runner]
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Trigger sdd-codegen fix mode
        run: |
          gh workflow run sdd-codegen.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}" \
            --field branch="${{ github.ref_name }}"
          echo "✅ sdd-codegen fix triggered on ${{ github.ref_name }}"

