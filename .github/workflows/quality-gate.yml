name: Quality Gate

on:
  # SDD Pipeline 完成后通过 workflow_dispatch 主动触发（见 claude-SDD.yml trigger-quality-gate job）
  workflow_dispatch:
  # PR 到 main 时触发
  pull_request:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'apps/mobile/**'
      - 'apps/tests/**'

jobs:
  # ─── Quality Gate ────────────────────────────────────────────────────────
  quality:
    runs-on: [self-hosted, ai-runner]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: |
          npm run lint

      - name: Build
        run: |
          npm run build

      - name: Run SDD-generated test cases
        run: |
          TEST_COUNT=$(find apps/tests/ -name "*.spec.js" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$TEST_COUNT" -gt 0 ]; then
            echo "🧪 Found $TEST_COUNT SDD-generated test file(s) — running..."
            npm run test
            echo "✅ SDD test cases passed"
          else
            echo "ℹ️ No SDD-generated test files in apps/tests/ — skipping"
          fi
