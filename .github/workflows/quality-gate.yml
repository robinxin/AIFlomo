name: Quality Gate

on:
  # SDD Pipeline 完成后通过 workflow_dispatch 主动触发（见 claude-SDD.yml trigger-quality-gate job）
  workflow_dispatch:
  # PR 到 main 时触发
  pull_request:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'apps/mobile/**'
      - 'apps/tests/**'

# ── 公共环境变量（所有 job 继承）─────────────────────────────────────────────
env:
  MODEL:                'claude-sonnet-4-5-20250929'
  CLAUDE_CODE_VERSION:  '2.1.50'
  ANTHROPIC_BASE_URL:   'http://127.0.0.1:18080'
  UPSTREAM_API_URL:     'https://claude.hatch.yinxiang.com/api'

jobs:
  # ─── Step 1: Claude 运行 verify-loop.md，检查 + 修复，再确认 lint/build 状态 ──
  verify:
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: write
    outputs:
      verify_passed: ${{ steps.check.outputs.verify_passed }}
      error_summary: ${{ steps.check.outputs.error_summary }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start proxy (strip context_management)
        run: bash scripts/ci/start-proxy.sh

      - name: Install Claude Code
        run: bash scripts/ci/install-claude.sh

      - name: Install dependencies
        run: bash scripts/ci/install.sh

      # 调用 verify-loop.md：Claude 执行 /verify，对每项错误自动修复，每项最多重试 5 次
      - name: Run verify-loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PROMPT_TEXT=$(cat .github/prompts/verify-loop.md)
          claude --print --dangerously-skip-permissions --verbose --output-format stream-json \
            --allowedTools "Read,Write,Edit,Bash(ls:*),Bash(find:*),Bash(grep:*),Bash(cat:*),Bash(bash scripts/ci/lint.sh:*),Bash(bash scripts/ci/build.sh:*),Bash(pnpm lint:*),Bash(npx eslint:*)" \
            --model "$MODEL" \
            "$PROMPT_TEXT"

      - name: Commit verify-loop fixes
        run: |
          BRANCH="${{ github.ref_name }}"
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add -u
          if git diff --cached --quiet; then
            echo "No changes from verify-loop"
          else
            git commit -m "fix: verify-loop auto-fix on ${BRANCH}"
            git pull --rebase origin "${BRANCH}" || true
            git push origin "HEAD:${BRANCH}"
            echo "✅ Verify-loop fixes committed and pushed to ${BRANCH}"
          fi

      # 重新运行 lint/build 确认结果，不依赖 Claude 的主观判断
      - name: Check verification status
        id: check
        run: |
          bash scripts/ci/lint.sh  2>&1 | tee /tmp/verify-lint.txt  || LINT_FAILED=true
          bash scripts/ci/build.sh 2>&1 | tee /tmp/verify-build.txt || BUILD_FAILED=true

          if [ "${LINT_FAILED:-}" = "true" ] || [ "${BUILD_FAILED:-}" = "true" ]; then
            echo "verify_passed=false" >> "$GITHUB_OUTPUT"
            DELIM="VERIFY_ERR_$(openssl rand -hex 8)"
            {
              echo "error_summary<<${DELIM}"
              [ "${LINT_FAILED:-}"  = "true" ] && echo "=== Lint Errors ===" && tail -100 /tmp/verify-lint.txt
              [ "${BUILD_FAILED:-}" = "true" ] && echo "=== Build Errors ===" && tail -100 /tmp/verify-build.txt
              echo "${DELIM}"
            } >> "$GITHUB_OUTPUT"
            echo "❌ Verification failed — lint or build errors remain."
          else
            echo "verify_passed=true" >> "$GITHUB_OUTPUT"
            echo "✅ Verification passed."
          fi

      - name: Write verify step summary
        if: always()
        run: |
          PASSED="${{ steps.check.outputs.verify_passed }}"
          {
            echo "## 🔍 Verify"
            echo ""
            echo "- **分支**: \`${{ github.ref_name }}\`"
            if [ "$PASSED" = "true" ]; then
              echo "- **状态**: ✅ 通过，将执行 Refactor Clean → E2E"
            else
              echo "- **状态**: ❌ 失败（verify-loop 已重试 5 次），等待人工确认"
            fi
            echo ""
            printf '\n---\n*[查看运行](%s/%s/actions/runs/%s)*\n' \
              "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Step 1.5: verify 通过后执行 refactor-clean ─────────────────────────────
  refactor-clean:
    needs: verify
    if: needs.verify.result == 'success' && needs.verify.outputs.verify_passed == 'true'
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start proxy (strip context_management)
        run: bash scripts/ci/start-proxy.sh

      - name: Install Claude Code
        run: bash scripts/ci/install-claude.sh

      - name: Install dependencies
        run: bash scripts/ci/install.sh

      - name: Run refactor-clean
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PROMPT_TEXT=$(cat .claude/commands/refactor-clean.md)
          claude --print --dangerously-skip-permissions --verbose --output-format stream-json \
            --allowedTools "Task,Read,Write,Edit,Bash(ls:*),Bash(find:*),Bash(grep:*),Bash(cat:*),Bash(pnpm:*),Bash(npx:*),Bash(bash scripts/ci/lint.sh:*),Bash(bash scripts/ci/build.sh:*)" \
            --model "$MODEL" \
            "$PROMPT_TEXT"

      - name: Commit refactor-clean changes
        run: |
          BRANCH="${{ github.ref_name }}"
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add -u
          if git diff --cached --quiet; then
            echo "No changes from refactor-clean"
          else
            git commit -m "refactor: clean dead code on ${BRANCH}"
            git pull --rebase origin "${BRANCH}" || true
            git push origin "HEAD:${BRANCH}"
            echo "✅ Refactor-clean changes committed and pushed to ${BRANCH}"
          fi

      - name: Write refactor-clean step summary
        if: always()
        run: |
          {
            echo "## 🧹 Refactor Clean"
            echo ""
            echo "- **分支**: \`${{ github.ref_name }}\`"
            echo "- **状态**: ✅ 已完成"
            echo ""
            printf '\n---\n*[查看运行](%s/%s/actions/runs/%s)*\n' \
              "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Step 2（通过路径）: 执行 E2E 测试（Claude e2e-loop 自动修复）──────────────
  run-e2e:
    needs: [verify, refactor-clean]
    if: needs.refactor-clean.result == 'success'
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: write
    outputs:
      test_errors: ${{ steps.collect-test-errors.outputs.test_errors }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start proxy (strip context_management)
        run: bash scripts/ci/start-proxy.sh

      - name: Install Claude Code
        run: bash scripts/ci/install-claude.sh

      - name: Install dependencies
        run: bash scripts/ci/install.sh

      - name: Run database migrations
        run: |
          bash scripts/ci/db-reset.sh  2>&1 | tee /tmp/db-reset-output.txt
          [ ${PIPESTATUS[0]} -eq 0 ] || exit 1
          bash scripts/ci/db-setup.sh  2>&1 | tee /tmp/db-setup-output.txt
          [ ${PIPESTATUS[0]} -eq 0 ] || exit 1
          bash scripts/ci/db-migrate.sh 2>&1 | tee /tmp/db-migrate-output.txt
          exit ${PIPESTATUS[0]}

      - name: Build frontend
        run: bash scripts/ci/build-frontend.sh

      - name: Start services for testing
        run: |
          # 后端：dev server（node --watch，文件变更自动重载）
          bash scripts/ci/server-start.sh > /tmp/server-output.txt 2>&1 &
          echo $! > /tmp/server.pid

          # 前端：serve 预编译静态产物（build 步骤已生成 apps/mobile/dist/）
          # 使用静态托管而非 Metro dev server，避免 JS bundle 懒编译导致测试时页面未就绪
          bash scripts/ci/frontend-serve.sh > /tmp/frontend-output.txt 2>&1 &
          echo $! > /tmp/frontend.pid

          echo "Services starting..."

          # 1. 等后端 /health 就绪（含 DB 可用性验证）
          SERVER_URL=$(bash scripts/ci/server-url.sh)
          for i in $(seq 1 30); do
            if curl -sf "$SERVER_URL/health" > /dev/null 2>&1; then
              echo "✅ Backend ready at $SERVER_URL"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Backend did not respond within 60s"
              cat /tmp/server-output.txt
              exit 1
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

          # 2. 等前端静态服务就绪（200 即代表 JS bundle 已可访问，无需额外等待编译）
          FRONTEND_URL=$(bash scripts/ci/frontend-url.sh)
          for i in $(seq 1 30); do
            if curl -sf "$FRONTEND_URL" > /dev/null 2>&1; then
              echo "✅ Frontend ready at $FRONTEND_URL"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Frontend did not respond within 60s"
              cat /tmp/frontend-output.txt
              exit 1
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done

          bash scripts/ci/patch-test-urls.sh "$FRONTEND_URL"

      # 记录 e2e-loop 前的 commit SHA，用于检测前端源码是否被 Claude 修改
      - name: Record HEAD before e2e-loop
        id: pre-loop
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # 调用 e2e-loop.md：Claude 执行 E2E，对每项失败自动调用对应 agent 修复，每项最多重试 5 次
      - name: Run e2e-loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PROMPT_TEXT=$(cat .github/prompts/e2e-loop.md)
          claude --print --dangerously-skip-permissions --verbose --output-format stream-json \
            --allowedTools "Task,Read,Write,Edit,Bash(bash scripts/ci/test.sh:*),Bash(bash scripts/ci/build.sh:*),Bash(bash scripts/ci/lint.sh:*),Bash(npx eslint:*),Bash(ls:*),Bash(find:*),Bash(grep:*),Bash(cat:*)" \
            --model "$MODEL" \
            "$PROMPT_TEXT"

      - name: Commit e2e-loop fixes
        run: |
          BRANCH="${{ github.ref_name }}"
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add -u
          if git diff --cached --quiet; then
            echo "No changes from e2e-loop"
          else
            git commit -m "fix: e2e-loop auto-fix on ${BRANCH}"
            git pull --rebase origin "${BRANCH}" || true
            git push origin "HEAD:${BRANCH}"
            echo "✅ E2E-loop fixes committed and pushed to ${BRANCH}"
          fi

      # 若 Claude 修改了前端源码，重新构建并重启静态服务，确保 final E2E 跑新产物
      - name: Rebuild frontend if source changed
        run: |
          BEFORE="${{ steps.pre-loop.outputs.sha }}"
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" = "$AFTER" ]; then
            echo "No commits made by e2e-loop, skip rebuild"
            exit 0
          fi
          if ! bash scripts/ci/frontend-changed.sh "$BEFORE" "$AFTER"; then
            echo "No mobile source changes, skip rebuild"
            exit 0
          fi
          echo "Mobile source changed, rebuilding frontend..."
          bash scripts/ci/build-frontend.sh
          kill "$(cat /tmp/frontend.pid)" 2>/dev/null || true
          bash scripts/ci/frontend-serve.sh > /tmp/frontend-output.txt 2>&1 &
          echo $! > /tmp/frontend.pid
          FRONTEND_URL=$(bash scripts/ci/frontend-url.sh)
          for i in $(seq 1 20); do
            if curl -sf "$FRONTEND_URL" > /dev/null 2>&1; then
              echo "✅ Frontend restarted at $FRONTEND_URL"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "❌ Frontend did not restart within 40s"
              cat /tmp/frontend-output.txt
              exit 1
            fi
            echo "Waiting for frontend... ($i/20)"
            sleep 2
          done

      - name: Run final E2E verification
        id: test
        run: |
          FRONTEND_URL=$(bash scripts/ci/frontend-url.sh)
          for i in $(seq 1 15); do
            if curl -sf "$FRONTEND_URL" > /dev/null 2>&1; then
              echo "✅ Frontend ready, starting tests"
              break
            fi
            echo "Waiting for frontend... ($i/15)"
            sleep 2
          done
          bash scripts/ci/test.sh 2>&1 | tee /tmp/test-output.txt
          exit ${PIPESTATUS[0]}

      - name: Stop services
        if: always()
        run: |
          for PIDFILE in /tmp/server.pid /tmp/frontend.pid; do
            if [ -f "$PIDFILE" ]; then
              PID=$(cat "$PIDFILE")
              kill -- "-$PID" 2>/dev/null || kill "$PID" 2>/dev/null || true
              echo "Stopped PID $PID ($PIDFILE)"
            fi
          done

      # E2E 错误输出供下游诊断使用
      - name: Collect test errors
        id: collect-test-errors
        if: always()
        run: |
          TEST_OUTCOME="${{ steps.test.outcome }}"
          DELIM="TEST_ERRORS_$(openssl rand -hex 8)"
          {
            echo "test_errors<<${DELIM}"
            [ "$TEST_OUTCOME" = "failure" ] && [ -s /tmp/test-output.txt ] && tail -200 /tmp/test-output.txt || true
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

      - name: Write E2E step summary
        if: always()
        run: |
          STATUS="${{ steps.test.outcome }}"
          {
            echo "## 🧪 E2E Tests"
            echo ""
            echo "- **分支**: \`${{ github.ref_name }}\`"
            echo "- **状态**: $([ "$STATUS" = "success" ] && echo '✅ 通过' || echo '❌ 失败（e2e-loop 已尝试自动修复，仍未通过，请人工介入）')"
            echo ""
            echo '```'
            tail -100 /tmp/test-output.txt 2>/dev/null || echo "(无输出)"
            echo '```'
            echo ""
            printf '\n---\n*[查看运行](%s/%s/actions/runs/%s)*\n' \
              "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── E2E 失败 → 人工确认（e2e-loop 已穷尽自动修复）────────────────────────────
  e2e-approval:
    needs: [verify, refactor-clean, run-e2e]
    if: always() && needs.run-e2e.result == 'failure'
    runs-on: [self-hosted, ai-runner]
    environment: e2e-gate
    steps:
      - name: Human review - E2E failed after e2e-loop
        run: echo "⚠️ E2E 测试经 e2e-loop 自动修复后仍失败，请人工确认后手动处理并重新触发流水线。"

  # ─── E2E 通过 → 触发 Code Review ────────────────────────────────────────────
  trigger-code-review:
    needs: [verify, refactor-clean, run-e2e]
    if: needs.run-e2e.result == 'success' && github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, ai-runner]
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Dispatch code-review
        run: |
          gh workflow run code-review.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}"
          echo "✅ Code Review triggered on ${{ github.ref_name }}"

  # ─── verify-loop 内部已重试 5 次仍失败 → 人工确认 ────────────────────────────
  verify-approval:
    needs: verify
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      needs.verify.result == 'success' &&
      needs.verify.outputs.verify_passed != 'true'
    runs-on: [self-hosted, ai-runner]
    environment: verify-gate
    steps:
      - name: Human review - verify-loop exhausted (5 retries)
        run: |
          echo "⚠️ verify-loop 已对每项错误重试 5 次，lint/build 仍未通过。"
          echo "请人工检查错误、手动修复后，重新触发 Quality Gate 流水线。"
