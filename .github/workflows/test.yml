name: Test

on:
  push:
    branches: [main, workflow-jl]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: apps/flomo/package-lock.json

      - name: Install dependencies
        run: cd apps/flomo && npm ci

      - name: Setup environment
        run: echo 'DATABASE_URL="file:./test.db"' > apps/flomo/.env

      - name: Generate Prisma client
        run: cd apps/flomo && npx prisma generate

      - name: Run database migrations
        run: cd apps/flomo && npx prisma db push --accept-data-loss

      - name: Type checking
        run: cd apps/flomo && npx tsc --noEmit

      - name: Run tests
        run: cd apps/flomo && npm test --if-present
