name: Code Review

on:
  # Quality Gate 通过后自动触发
  workflow_run:
    workflows: ["Quality Gate"]
    types: [completed]
  workflow_dispatch:
    inputs:
      extra_prompt:
        description: '额外指令（追加到 AI prompt 末尾）'
        default: ''
        required: false

jobs:
  # ─── Code Review (AI 审核 + 人工确认) ────────────────────────────────────
  code-review:
    if: >-
      ${{ github.event_name != 'workflow_run'
          || github.event.workflow_run.conclusion == 'success' }}
    environment: code-review-approval
    runs-on: [self-hosted, ai-runner]
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      ANTHROPIC_BASE_URL: 'http://127.0.0.1:18080'
      UPSTREAM_API_URL:   'https://claude.hatch.yinxiang.com/api'
      MODEL:              'claude-sonnet-4-5-20250929'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start proxy (strip context_management)
        env:
          UPSTREAM_API_URL: ${{ env.UPSTREAM_API_URL }}
        run: |
          cat > /tmp/strip-proxy.js << 'EOF'
          const http = require('http'), https = require('https');
          const up = new URL(process.env.UPSTREAM_API_URL);
          http.createServer((req, res) => {
            let body = '';
            req.on('data', c => body += c);
            req.on('end', () => {
              try { const d = JSON.parse(body); delete d.context_management; body = JSON.stringify(d); } catch(e) {}
              const opts = {
                hostname: up.hostname, port: 443,
                path: up.pathname + (req.url === '/' ? '' : req.url),
                method: req.method,
                headers: { ...req.headers, host: up.hostname, 'content-length': Buffer.byteLength(body) }
              };
              const r = https.request(opts, pr => { res.writeHead(pr.statusCode, pr.headers); pr.pipe(res); });
              r.on('error', e => { res.writeHead(502); res.end(e.message); });
              r.write(body); r.end();
            });
          }).listen(18080, '127.0.0.1', () => console.log('Proxy ready on :18080'));
          EOF
          node /tmp/strip-proxy.js &
          sleep 2

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code@2.1.50

      - name: Load Constitution
        run: |
          {
            echo "CONSTITUTION<<CONSTITUTION_EOF"
            cat CONSTITUTION.md 2>/dev/null || echo "# No constitution file found"
            echo "CONSTITUTION_EOF"
          } >> "$GITHUB_ENV"

      - name: Generate diff against main
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            HEAD="${{ github.event.workflow_run.head_branch }}"
          else
            HEAD="${{ github.ref_name }}"
          fi
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"

          git diff origin/main...HEAD > /tmp/review.diff
          echo "REVIEW_CONTEXT=Code review for branch ${HEAD}" >> "$GITHUB_ENV"

      - name: Run Claude Code Review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXTRA_PROMPT: ${{ github.event.inputs.extra_prompt }}
        run: |
          if [ ! -s /tmp/review.diff ]; then
            echo "ℹ️ No diff against main — skipping review."
            echo "No changes to review." > /tmp/review-result.txt
            exit 0
          fi

          # Truncate diff to 150KB to stay within OS argument limits
          export DIFF=$(head -c 150000 /tmp/review.diff)

          python3 .github/scripts/envsubst.py < .github/prompts/code-review.md > /tmp/prompt.txt

          # Unset large env var before spawning claude
          unset DIFF

          RESULT=$(claude --print \
            --allowedTools "Read,Bash(ls:*)" \
            --model "$MODEL" \
            "$(cat /tmp/prompt.txt)")

          echo "$RESULT"
          echo "$RESULT" > /tmp/review-result.txt

      - name: Post review to step summary
        if: always()
        run: |
          {
            echo "## 🔍 Code Review"
            echo ""
            cat /tmp/review-result.txt 2>/dev/null || echo "No review result."
            echo ""
            printf '\n---\n*Generated by Claude `%s` · [Workflow run](%s/%s/actions/runs/%s)*\n' \
              "$MODEL" "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment review on existing PR (if any)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD="${{ steps.diff.outputs.head }}"

          PR_NUMBER=$(gh pr list \
            --head "$HEAD" --base "main" \
            --json number --jq '.[0].number' 2>/dev/null || true)

          if [ -z "$PR_NUMBER" ]; then
            echo "ℹ️ No PR found for $HEAD — review in step summary only."
            exit 0
          fi

          {
            echo "## 🔍 Code Review"
            echo ""
            cat /tmp/review-result.txt 2>/dev/null || echo "No review result."
            echo ""
            printf '\n---\n*Generated by Claude `%s` · [run](%s/%s/actions/runs/%s)*\n' \
              "$MODEL" "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}"
          } > /tmp/pr-review-comment.md

          gh pr comment "$PR_NUMBER" --body-file /tmp/pr-review-comment.md
          echo "✅ Review posted to PR #$PR_NUMBER"
