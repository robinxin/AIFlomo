name: Feature Request
description: 提交一个新功能需求
title: "[Feature] "
labels:
  - feature-request
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交功能需求！填写完成后，给 Issue 打上 `ai-feature` 标签，AI 将自动生成 Spec 并启动开发流程。

  - type: input
    id: feature-name
    attributes:
      label: 功能名称
      description: 简洁描述这个功能（5-10 字）
      placeholder: 例如：Memo 导出为 Markdown
    validations:
      required: true

  - type: textarea
    id: user-story
    attributes:
      label: 用户故事
      description: 描述用户场景
      placeholder: |
        作为...
        我希望...
        以便...
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: 验收标准
      description: 列出功能完成的可验证条件
      placeholder: |
        - [ ] 用户可以...
        - [ ] 系统应该...
        - [ ] 错误时显示...
    validations:
      required: true

  - type: textarea
    id: technical-notes
    attributes:
      label: 技术备注（可选）
      description: 技术限制、相关文件、实现思路等
      placeholder: 例如：涉及 apps/lib/memo.ts，需要新增 API endpoint
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        **触发 AI 开发**：填写完成后，给此 Issue 打上 `ai-feature` 标签，AI 将自动：
        1. 根据上述内容生成 Spec 文档
        2. 创建 `feat/<issue-number>-<slug>` 分支
        3. 触发 SDD Pipeline（代码生成 → 测试 → PR）
